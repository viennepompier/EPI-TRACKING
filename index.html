5CYII=" alt="SDIS Isère" style={{height:42,width:"auto",objectFit:"contain",flexShrink:0,filter:"drop-shadow(0 1px 3px rgba(0,0,0,0.35))"}}/>
          <div style={{borderLeft:"1px solid rgba(255,255,255,0.12)",paddingLeft:10,textAlign:"left"}}>
            <div style={{fontSize:14,fontWeight:800,color:"#fff",lineHeight:1,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:".06em"}}>EPI TRACK</div>
            <div style={{fontSize:7,color:"rgba(255,255,255,0.30)",fontWeight:600,letterSpacing:".18em",marginTop:3,textTransform:"uppercase"}}>SDIS 38 · Vienne</div>
          </div>
        </button>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5}}>
          <button onClick={()=>{setInitStatut("en_service");setView("all");}} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",background:"rgba(22,163,74,0.15)",border:"1px solid rgba(22,163,74,0.25)",borderRadius:99,cursor:"pointer",color:"#4ADE80",fontSize:11,fontFamily:"inherit",fontWeight:700}}>
            <span style={{width:5,height:5,borderRadius:99,background:"#4ADE80",flexShrink:0}}/>
            <span>{tenues.filter(t=>t.statut==="en_service").length} service</span>
          </button>
          <button onClick={()=>{setInitStatut("en_stock");setView("all");}} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.25)",borderRadius:99,cursor:"pointer",color:"#93C5FD",fontSize:11,fontFamily:"inherit",fontWeight:700}}>
            <span style={{width:5,height:5,borderRadius:99,background:"#93C5FD",flexShrink:0}}/>
            <span>{tenues.filter(t=>t.statut==="en_stock").length} stock</span>
          </button>

        </div>
      </div>
    </header>

    <ScanBar tenues={tenues} onDetail={openDetail} onCreatePrefill={pre=>{setScanBuf(pre);setOverlay("create");}} blocked={!!(overlay||master||washEdit||affectId)}/>

    {/* Desktop: left panel home, right panel detail/all */}
    <div className="desktop-cols" style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* Left sidebar (desktop only) */}
      <div style={{borderRight:`1px solid ${T.border}`,overflowY:"auto",background:T.surface,display:"flex",flexDirection:"column"}}>
        <HomeView tenues={tenues} histo={histo} onDetail={openDetail} setOverlay={setOverlay} setView={setView} setPresel={setPresel} setInitStatut={setInitStatut} setAffectId={setAffectId}/>
      </div>

      {/* Main content */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {(view==="home")&&<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center",padding:32}}>
            <div style={{width:56,height:56,background:T.navyLight,borderRadius:16,margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center"}}><Search size={22} color={T.navy}/></div>
            <div style={{fontSize:13,fontWeight:700,color:T.t1,marginBottom:4}}>Scanner ou sélectionner une tenue</div>
            <div style={{fontSize:11,color:T.t3}}>Utilisez la barre de scan ou cliquez sur une tenue</div>
          </div>
        </div>}
        {view==="all"&&<AllView key={initStatut} tenues={tenues} onBack={()=>setView("home")} onDetail={openDetail} setOverlay={setOverlay} setPresel={setPresel} initStatut={initStatut} setAffectId={setAffectId}/>}
        {view==="detail"&&sel&&<DetailView t={sel} histo={histo} tenues={tenues} onBack={()=>setView("home")} onChange={openChange} onArchive={archiveTrigger} onDelete={deleteTrigger} onEditWash={editWashTrigger}
          onAffect={id=>setAffectId(id)} onEditEvtDate={openEvtDateEdit}
          onStock={id=>{const idv=id;setTenues(p=>p.map(t=>t.id===idv?{...t,statut:"en_stock",agent_actuel:"",date_derniere_action:today()}:t));setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date:today(),id_tenue:idv,action:"Retour stock"}]);setView("home");showToast("Tenue remise en stock");apiCall("retourStock",{id:idv});}}
        />}
      </div>
    </div>

    {overlay==="create"&&<CreateSheet onClose={()=>{setOverlay(null);setScanBuf("");}} onSave={saveTenue} tenues={tenues} lastOp={lastOp} setLastOp={setLastOp} prefill={scanBuf||null}/>}
    {overlay==="change"&&<ChangeSheet onClose={()=>setOverlay(null)} onSave={saveChange} tenues={tenues} presel={presel} lastOp={lastOp} setLastOp={setLastOp}/>}
    {overlay==="archive"&&archPend&&<ArchiveSheet tenue={archPend} onClose={()=>setOverlay(null)} onSave={saveArchive}/>}
    {overlay==="export"&&<ExportSheet tenues={tenues} histo={histo} onClose={()=>setOverlay(null)}/> }
    {overlay==="agents"&&<AgentsSheet tenues={tenues} histo={histo} onClose={()=>setOverlay(null)} onDetail={id=>{openDetail(id);}} onChangeFor={id=>{setPresel(id);setOverlay("change");}} onEditAgent={saveAgentEdit}/>}
    {affectId&&<AffectSheet tenue={tenues.find(t=>t.id===affectId)} onClose={()=>setAffectId(null)} onSave={saveAffect} tenues={tenues} lastOp={lastOp} setLastOp={setLastOp}/>}
    {master&&<MasterModal action={master.action} onSuccess={master.cb} onClose={()=>setMaster(null)}/>}
    {washEdit&&sel&&<WashEditModal tenue={sel} onSave={saveWash} onClose={()=>setWashEdit(false)}/>}
    {seuilEdit&&<SeuilEditModal current={seuil} onSave={saveSeuil} onClose={()=>setSeuilEdit(false)}/>}
    {evtDateEdit&&<EventDateEditModal evt={evtDateEdit} onSave={saveEvtDate} onClose={()=>setEvtDateEdit(null)}/>}
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
  </div></SeuilCtx.Provider>;
}
  
    const _root = ReactDOM.createRoot(document.getElementById('root'));
    _root.render(<ErrorBoundary><App/></ErrorBoundary>);
  </script>
</body>
