/* ──────────────────────────────────────────────────────

────────────────────────────────────────────────────── */
function GradeIcon({grade,size=28}){
  const S=size,r2=Math.max(2,S*0.08);
  const uid=`gi${grade.replace(/[^a-z]/gi,"")}${S}`;
  const R="#E82018",W="#F8F6F4",O="#F5A800",K="#1A0800",L=0.55;
  const stripe=(x,mc,oc,mw=.13,ow=.21)=>{const cx=S/2+x,x1=cx-L*(S/2),y1=S,x2=cx+L*(S/2),y2=0;return <g key={x}>{oc&&<line x1={x1} y1={y1} x2={x2} y2={y2} stroke={oc} strokeWidth={S*ow}/>}<line x1={x1} y1={y1} x2={x2} y2={y2} stroke={mc} strokeWidth={S*mw}/></g>;};
  const stripes=(n,mc,oc=null)=>{const sp=S*.22;return({1:[0],2:[-sp/2,sp/2],3:[-sp,0,sp]}[n]||[0]).map(o=>stripe(o,mc,oc));};
  const hBars=bars=>{const gap=S*.065,px=S*.12,th=bars.reduce((a,b)=>a+b.h*S,0)+(bars.length-1)*gap;let y=(S-th)/2;return bars.map((b,i)=>{const bh=b.h*S,el=<rect key={i} x={px} y={y} width={S-px*2} height={bh} fill={b.c}/>;y+=bh+gap;return el;});};
  const frame=(c=W,w=2)=><rect x={w/2} y={w/2} width={S-w} height={S-w} rx={r2} fill="none" stroke={c} strokeWidth={w}/>;
  let cnt=null,brd=null;
  if(grade==="Sapeur 1re cl."){cnt=stripes(1,R,null,.20);brd=frame();}
  else if(grade==="Caporal"){cnt=stripes(2,R,null,.16);brd=frame();}
  else if(grade==="Caporal-Chef"){cnt=stripes(3,R,null,.13);brd=frame();}
  else if(grade==="Sergent"){cnt=stripes(1,R,W,.13,.22);}
  else if(grade==="Sergent-Chef"){cnt=stripes(3,R,W,.10,.17);}
  else if(grade==="Adjudant"){const bH=S*.28,bY=(S-bH)/2,rH=S*.07,rY=(S-rH)/2,px=S*.10;cnt=[<rect key="o" x={px} y={bY} width={S-px*2} height={bH} fill={O}/>,<rect key="r" x={px} y={rY} width={S-px*2} height={rH} fill={R}/>];}
  else if(grade==="Adjudant-Chef"){const bH=S*.28,bY=(S-bH)/2,rH=S*.07,rY=(S-rH)/2,px=S*.10;cnt=[<rect key="w" x={px} y={bY} width={S-px*2} height={bH} fill={W}/>,<rect key="r" x={px} y={rY} width={S-px*2} height={rH} fill={R}/>];}
  else if(grade==="Lieutenant"){cnt=hBars([{c:W,h:.14},{c:W,h:.14}]);brd=frame();}
  else if(grade==="Capitaine"){cnt=hBars([{c:W,h:.12},{c:W,h:.12},{c:W,h:.12}]);brd=frame();}
  else if(grade==="Commandant"){cnt=hBars([{c:W,h:.10},{c:W,h:.10},{c:W,h:.10},{c:W,h:.10}]);brd=frame();}
  else if(grade==="Lieutenant-Colonel"){cnt=hBars([{c:W,h:.09},{c:O,h:.09},{c:W,h:.09},{c:O,h:.09},{c:W,h:.09}]);brd=frame();}
  else if(grade==="Colonel"){cnt=hBars([{c:W,h:.09},{c:W,h:.09},{c:W,h:.09},{c:W,h:.09},{c:W,h:.09}]);brd=frame();}
  return <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`} style={{flexShrink:0,display:"block"}}><defs><clipPath id={uid}><rect x={0} y={0} width={S} height={S} rx={r2}/></clipPath></defs><rect x={0} y={0} width={S} height={S} rx={r2} fill={K}/><g clipPath={`url(#${uid})`}>{cnt}</g>{brd}</svg>;
}

function WashEditModal({tenue,onSave,onClose}){
  const seuil=useSeuil();
  const [val,setVal]=useState(String(lavN(tenue)));
  const [err,setErr]=useState("");
  const save=()=>{
    const n=parseInt(val);
    if(isNaN(n)||n<0){setErr("Nombre invalide");return;}
    if(n>999){setErr("Maximum 999");return;}
    onSave(n);
  };
  const cur=lavN(tenue);
  return <div style={{position:"fixed",inset:0,background:"rgba(8,12,26,0.65)",backdropFilter:"blur(8px)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fff",border:`1px solid ${T.border}`,borderRadius:16,width:"100%",maxWidth:300,padding:"22px 18px",boxShadow:"0 18px 50px rgba(0,0,0,0.18)",animation:"popIn .2s ease"}}>
      <div style={{textAlign:"center",marginBottom:16}}>
        <div style={{width:42,height:42,borderRadius:11,background:T.navyLight,margin:"0 auto 9px",display:"flex",alignItems:"center",justifyContent:"center"}}><Droplets size={18} color={T.navy}/></div>
        <div style={{fontSize:14,fontWeight:700,color:T.t1}}>Corriger les lavages</div>
        <div style={{fontSize:11.5,color:T.t3,marginTop:3}}>{tenue.id} · actuellement {cur}/{seuil}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center",marginBottom:10}}>
        <button onClick={()=>setVal(v=>{const n=Math.max(0,parseInt(v||0)-1);return String(n);})} style={{width:36,height:36,borderRadius:99,background:T.bg,border:`1.5px solid ${T.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}><Minus size={15} color={T.t2}/></button>
        <input value={val} onChange={e=>{setVal(e.target.value);setErr("");}} type="number"

        <button onClick={()=>setVal(v=>{const n=Math.min(99,parseInt(v||0)+1);return String(n);})} style={{width:36,height:36,borderRadius:99,background:T.bg,border:`1.5px solid ${T.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}><Plus size={15} color={T.t2}/></button>
      </div>
      {err&&<p style={{color:T.red,fontSize:11,textAlign:"center",marginBottom:8,fontWeight:700}}>{err}</p>}
      <div style={{height:6,background:"rgba(0,0,0,0.06)",borderRadius:99,overflow:"hidden",marginBottom:14}}>
        <div style={{width:`${Math.min((parseInt(val)||0)/seuil*100,100)}%`,height:"100%",background:lavColor(parseInt(val)||0,seuil),borderRadius:99,transition:"width .2s"}}/>
      </div>
      <BtnNavy onClick={save} full style={{width:"100%",justifyContent:"center"}} icon={Check}>Enregistrer</BtnNavy>
      <BtnGhost onClick={onClose} full style={{width:"100%",justifyContent:"center",marginTop:6}}>Annuler</BtnGhost>
    </div>
  </div>;
}

    "Archivage":{Ico:Archive,c:T.warn.c,bg:T.warn.bg,bd:T.warn.bd,label:"Archivage"},

    "Retour stock":{Ico:Inbox,c:T.stk.c,bg:T.stk.bg,bd:T.stk.bd,label:evt.auto?"Mise en stock":"Retour stock"},
  };

          {evt.portee_par&&<span style={{fontSize:11,fontWeight:600,color:T.t2}}>{evt.portee_par}</span>}
          <span style={{fontSize:10,color:T.t3,flexShrink:0}}>{fmt(evt.date)}</span>
        </div>
        <div style={{padding:"8px 10px"}}>
          <div style={{padding:"8px 10px",background:"rgba(59,130,246,0.06)",border:`1px solid ${T.stk.bd}`,borderRadius:8}}>

            <div style={{display:"flex",alignItems:"center",gap:8}}>

        </div>}
      </div>

  /* ── Affectation : toujours lisible sans clic ── */
  if(evt.action==="Affectation"){
    return <div style={{display:"flex",gap:10,position:"relative"}}>
      {!isLast&&<div style={{position:"absolute",left:12,top:26,bottom:-12,width:1.5,background:`linear-gradient(to bottom,${bd},transparent)`}}/>}
      <div style={{width:25,height:25,borderRadius:7,background:bg,border:`1.5px solid ${bd}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,zIndex:1}}><Ico size={11} color={c}/></div>

  /* ── Création : toujours lisible sans clic ── */
  if(evt.action==="Création"){
    return <div style={{display:"flex",gap:10,position:"relative"}}>
      {!isLast&&<div style={{position:"absolute",left:12,top:26,bottom:-12,width:1.5,background:`linear-gradient(to bottom,${bd},transparent)`}}/>}
      <div style={{width:25,height:25,borderRadius:7,background:bg,border:`1.5px solid ${bd}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,zIndex:1}}><Ico size={11} color={c}/></div>
      <div style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,marginBottom:isLast?0:12,padding:"7px 12px",display:"flex",alignItems:"center",gap:8}}>

          <div style={{fontSize:9,fontWeight:800,color:T.svc.c,textTransform:"uppercase",letterSpacing:".12em",marginBottom:2}}>Mise en service</div>

      </div>
    </div>;
  }

  /* ── Autres événements (Archivage, Correction, Suppression…) ── */
  const summary={
    "Archivage": evt.motif||"Non précisé",
    "Correction lavages": evt.ancien!==undefined?`${evt.ancien} → ${evt.nouveau} lavages`:"",
    "Suppression":"Tenue supprimée",
    "Retour stock": evt.auto?"Après lavage — disponible en stock":"Remise en stock manuellement",
  }[evt.action]||"";
  return <div style={{display:"flex",gap:10,position:"relative"}}>
    {!isLast&&<div style={{position:"absolute",left:12,top:26,bottom:-12,width:1.5,background:`linear-gradient(to bottom,${bd},transparent)`}}/>}
    <div style={{width:25,height:25,borderRadius:7,background:bg,border:`1.5px solid ${bd}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,zIndex:1}}><Ico size={11} color={c}/></div>
    <div style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,marginBottom:isLast?0:12,padding:"7px 12px",display:"flex",alignItems:"center",gap:8}}>

      </div>
      <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
        <span style={{fontSize:10,color:T.t3}}>{fmt(evt.date)}</span>
        {onEditDate&&!evt.auto&&<button onClick={e=>{e.stopPropagation();onEditDate(evt);}} title="Corriger la date" style={{width:18,height:18,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.04)",border:`1px solid ${T.border}`,borderRadius:4,cursor:"pointer",color:T.t4,flexShrink:0,padding:0}}><Edit3 size={8}/></button>}
      </div>
    </div>
  </div>;
}

/* ──────────────────────────────────────────────────────
   SMART SEARCH — cherche d'abord, propose créer si rien
────────────────────────────────────────────────────── */
function SmartSearch({tenues,onDetail,onCreatePrefill,onClose}){
  const [q,setQ]=useState("");
  const inputRef=useRef(null);
  const seuilQ=useSeuil(); // ← déplacé ici (hooks interdits dans les callbacks)
  useEffect(()=>{inputRef.current?.focus();},[]);

  const results=q.trim().length>=1
    ? tenues.filter(t=>t.statut!=="supprime"&&(
        t.id.toLowerCase().includes(q.toLowerCase())||
        (t.agent_actuel||"").toLowerCase().includes(q.toLowerCase())
      )).slice(0,8)
    : [];

  const exactMatch=tenues.find(t=>t.id.toLowerCase()===q.trim().toLowerCase());

  return <div style={{position:"fixed",inset:0,background:"rgba(8,12,26,0.50)",backdropFilter:"blur(5px)",zIndex:800,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:60,paddingLeft:16,paddingRight:16}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:500,background:T.surface,borderRadius:14,border:`1px solid ${T.border}`,boxShadow:"0 16px 48px rgba(0,0,0,0.16)",overflow:"hidden",animation:"popIn .18s ease"}}>
      {/* Search input */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderBottom:`1px solid ${T.borderSub}`}}>
        <Search size={15} color={T.t3}/>
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value.toUpperCase())} placeholder="N° de tenue, agent…"
          style={{flex:1,border:"none",background:"transparent",fontSize:14,color:T.t1,outline:"none",fontFamily:"'IBM Plex Mono',monospace"}}/>
        {q&&<button onClick={()=>setQ("")} style={{background:"none",border:"none",cursor:"pointer",color:T.t3,display:"flex"}}><X size={13}/></button>}
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:T.t3,padding:"2px 6px",fontSize:11,fontFamily:"inherit"}}>Esc</button>
      </div>

      {/* Results */}
      {q.trim().length>=1&&<div style={{maxHeight:320,overflowY:"auto"}}>
        {results.length>0&&results.map(t=>{
          const EI=t.type==="veste"?IMG_VESTE:IMG_PAN;
          const n=lavN(t),col=lavColor(n,seuilQ);
          return <button key={t.id} onClick={()=>{onDetail(t.id);onClose();}}
            style={{display:"flex",alignItems:"center",gap:11,width:"100%",padding:"10px 14px",background:"none",border:"none",borderBottom:`1px solid ${T.borderSub}`,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
            <img src={EI} alt="" style={{width:24,height:24,objectFit:"contain",flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:T.t1,fontFamily:"'IBM Plex Mono',monospace"}}>{t.id}</div>
              <div style={{fontSize:10.5,color:T.t3,marginTop:1}}>{t.type==="veste"?"Veste":"Pantalon"} · {t.taille}{t.agent_actuel?` · ${t.agent_actuel}`:""}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
              <Badge statut={t.statut}/>
              <span style={{fontSize:10,fontWeight:700,color:col}}>{n}/{seuilQ}</span>
            </div>
          </button>;
        })}

        {/* Aucun résultat → proposer création */}
        {results.length===0&&<div style={{padding:"16px 14px",display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontSize:12.5,color:T.t3,textAlign:"center"}}>Aucune tenue trouvée pour <strong style={{color:T.t2,fontFamily:"'IBM Plex Mono',monospace"}}>{q}</strong></div>
          <button onClick={()=>{onCreatePrefill(q);onClose();}}
            style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"10px",background:T.navy,color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13}}>
            <Plus size={14}/>Créer la tenue {q}
          </button>
        </div>}
      </div>}

      {q.trim().length===0&&<div style={{padding:"14px",display:"flex",flexDirection:"column",gap:5}}>
        <div style={{fontSize:10,color:T.t3,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",marginBottom:3}}>Tenues récentes</div>
        {tenues.filter(t=>t.statut==="en_service").slice(0,4).map(t=>{
          const EI=t.type==="veste"?IMG_VESTE:IMG_PAN;
          return <button key={t.id} onClick={()=>{onDetail(t.id);onClose();}}
            style={{display:"flex",alignItems:"center",gap:9,padding:"7px 9px",background:T.surfaceAlt,border:`1px solid ${T.border}`,borderRadius:9,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
            <img src={EI} alt="" style={{width:22,height:22,objectFit:"contain",flexShrink:0}}/>
            <span style={{fontSize:12.5,fontWeight:700,color:T.t1,flex:1,fontFamily:"'IBM Plex Mono',monospace"}}>{t.id}</span>
            {t.agent_actuel&&<span style={{fontSize:10.5,color:T.t3}}>{t.agent_actuel}</span>}
          </button>;
        })}
      </div>}
    </div>
  </div>;
}

────────────────────────────────────────────────────── */
function ChangeSheet({onClose,onSave,tenues,presel,lastOp,setLastOp}){
  const preselTenue=presel?tenues.find(t=>t.id===presel):null;
  const seuilCS=useSeuil(); // ← au niveau du composant
  const [date,setDate]=useState(today());
  const [ren,setRen]=useState(presel||"");
  const [don,setDon]=useState("");
  const [pasChange,setPasChange]=useState(false);
  const [grade,setGrade]=useState(lastOp?.grade||"Sergent");
  const [nom,setNom]=useState(lastOp?.nom||"");
  const [sg,setSg]=useState(false);

  // L'agent est TOUJOURS celui qui porte la tenue → auto-rempli, non modifiable
  const renTenue=tenues.find(t=>t.id===ren);
  const agentAuto=renTenue?.agent_actuel||"";

  const selectRen=id=>{setRen(id);setDon("");};

  /* Tenues propres : en stock, même type que la rendue */
  const stks=tenues.filter(t=>t.statut==="en_stock"&&t.id!==ren&&(!renTenue||t.type===renTenue.type))
    .sort((a,b)=>(a.date_service||"").localeCompare(b.date_service||"")||lavN(a)-lavN(b));
  /* Tenues à rendre : uniquement en_service */
  const svcs=tenues.filter(t=>t.statut==="en_service")
    .sort((a,b)=>(a.date_service||"").localeCompare(b.date_service||"")||lavN(b)-lavN(a));

  const ok=ren&&nom.trim()&&agentAuto&&(don||pasChange);

  const save=()=>{
    setLastOp({grade,nom:nom.toUpperCase()});
    onSave({id_tenue_rendue:ren,id_tenue_donnee:pasChange?null:don,agent_nom:agentAuto,devenir:"stock",beneficiaire_direct:"",date,enregistre_par:{grade,nom:nom.toUpperCase()}});
  };

  const ERow=({t,sel,onSel,dark})=>{
    const EI=t.type==="veste"?IMG_VESTE:IMG_PAN;
    const active=sel===t.id;
    const n=lavN(t);const col=n>=50?"#DC2626":n>=45?"#D97706":"#16A34A";
    return <button onClick={()=>onSel(t.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:active?(dark?T.navy:T.navyLight):T.surface,border:`1.5px solid ${active?(dark?"transparent":"rgba(15,30,56,0.22)"):T.border}`,borderRadius:8,cursor:"pointer",fontFamily:"inherit",marginBottom:3,width:"100%",textAlign:"left"}}>
      <img src={EI} alt="" style={{width:18,height:18,objectFit:"contain",flexShrink:0,filter:active&&dark?"brightness(10)":"none"}}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:12,fontWeight:700,color:active&&dark?"#fff":T.t1,fontFamily:"'IBM Plex Mono',monospace"}}>{t.id}</div>
        {t.agent_actuel&&<div style={{fontSize:9.5,color:active&&dark?"rgba(255,255,255,.55)":T.t3,fontWeight:500,marginTop:1}}>{t.agent_actuel}</div>}
      </div>
      <span style={{fontSize:9,fontWeight:800,color:active&&dark?"rgba(255,255,255,.55)":col,flexShrink:0}}>{n}/{seuilCS}</span>
    </button>;
  };

  return <Sheet onClose={onClose} title="Change — Lavage" sub="Tenue rendue → lavage → stock · Propre → affectée">
    <div style={{display:"flex",flexDirection:"column",gap:14}}>

      <Field label="Date du lavage (date réelle si saisie différée)"><TInput value={date} onChange={e=>setDate(e.target.value)} type="date" icon={Calendar}/></Field>

      {/* ── TENUE RENDUE (portée par l'agent) ── */}
      <Field label="Tenue rendue par l'agent">
        {presel
          ?<div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.navyLight,borderRadius:9,border:`1.5px solid rgba(15,30,56,0.20)`}}>
              <img src={renTenue?.type==="veste"?IMG_VESTE:IMG_PAN} alt="" style={{width:22,height:22,objectFit:"contain",flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:15,fontWeight:800,color:T.navy,fontFamily:"'IBM Plex Mono',monospace",lineHeight:1}}>{ren}</div>
                {agentAuto&&<div style={{fontSize:11,color:T.t2,fontWeight:600,marginTop:3}}>Portée par {agentAuto}</div>}
              </div>
              <span style={{fontSize:9.5,fontWeight:700,padding:"3px 9px",borderRadius:99,background:T.stk.bg,color:T.stk.c,border:`1px solid ${T.stk.bd}`,whiteSpace:"nowrap"}}>→ lavage · stock</span>
            </div>
          :<div style={{maxHeight:160,overflowY:"auto"}}>{svcs.length>0?svcs.map(t=><ERow key={t.id} t={t} sel={ren} onSel={selectRen}/>):<div style={{padding:"10px",fontSize:11,color:T.t3,fontStyle:"italic"}}>Aucune tenue en service</div>}</div>
        }
      </Field>

      {/* Agent auto-affiché si sélection libre */}
      {!presel&&agentAuto&&<div style={{padding:"8px 11px",background:T.svc.bg,border:`1px solid ${T.svc.bd}`,borderRadius:8,display:"flex",alignItems:"center",gap:7}}>
        <User size={13} color={T.svc.c}/>
        <span style={{fontSize:11.5,fontWeight:700,color:T.svc.c}}>{agentAuto}</span>
        <span style={{fontSize:10,color:T.svc.c,opacity:.7,marginLeft:2}}>— porteur identifié automatiquement</span>
      </div>}

      {/* ── TENUE PROPRE DONNÉE (optionnel) ── */}
      {ren&&<Field label={`Tenue propre à donner à ${agentAuto||"l'agent"}`}>
        {stks.length>0
          ?<div style={{maxHeight:160,overflowY:"auto"}}>{stks.map(t=><ERow key={t.id} t={t} sel={don} onSel={id=>{setDon(id);setPasChange(false);}} dark/>)}</div>
          :<div style={{padding:"10px",background:"rgba(0,0,0,0.03)",borderRadius:8,fontSize:11,color:T.t3,fontStyle:"italic"}}>Aucune tenue en stock de ce type</div>
        }
        <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",marginTop:6,padding:"7px 9px",background:"rgba(0,0,0,0.03)",borderRadius:7}}>
          <input type="checkbox" checked={pasChange} onChange={e=>{setPasChange(e.target.checked);if(e.target.checked)setDon("");}}
            style={{width:14,height:14,accentColor:T.navy,flexShrink:0}}/>
          <span style={{fontSize:11,color:T.t2,fontWeight:600}}>Pas de tenue disponible pour l'instant</span>
        </label>
      </Field>}

      <OpRow grade={grade} setGrade={setGrade} nom={nom} setNom={setNom} onShowGrade={()=>setSg(true)}/>
      <BtnNavy onClick={save} disabled={!ok} icon={CheckCircle2} full style={{width:"100%",justifyContent:"center",padding:"10px 16px",fontSize:13}}>Enregistrer le lavage</BtnNavy>
    </div>
    {sg&&<GradePicker value={grade} onChange={setGrade} onClose={()=>setSg(false)}/>}
  </Sheet>;
}

/* ──────────────────────────────────────────────────────
   CREATE SHEET
────────────────────────────────────────────────────── */
function CreateSheet({onClose,onSave,tenues,lastOp,setLastOp,prefill}){
  const [id,setId]=useState(prefill||""),[type,setType]=useState(""),[taille,setTaille]=useState(""),[ds,setDs]=useState(today()),[la,setLa]=useState("0"),[inc,setInc]=useState(false),[statut,setStatut]=useState("en_stock"),[ag,setAg]=useState(""),[grade,setGrade]=useState(lastOp?.grade||"Sergent"),[nom,setNom]=useState(lastOp?.nom||""),[sg,setSg]=useState(false);
  const [donChange,setDonChange]=useState("");
  const [pasDonChange,setPasDonChange]=useState(false);
  const seuilCR=useSeuil(); // ← au niveau du composant
  const enLavage=statut==="en_lavage";
  const ok=id.trim()&&type&&taille.trim()&&taille!=='—'&&nom.trim()&&((statut==="en_stock")||(ag.trim()));
  const pickType=v=>{setType(v);if(!id)setId(nextId(tenues,v==="veste"?"VES":"PAN"));};

  /* Stock tenues of same type for change selection */
  const stksChange=tenues.filter(t=>t.statut==="en_stock"&&(!type||t.type===type))
    .sort((a,b)=>(a.date_service||"").localeCompare(b.date_service||"")||lavN(a)-lavN(b));

  const save=()=>{
    const ts=Date.now();
    const obj={
      id:id.trim().toUpperCase(),type,taille:taille||"—",caserne:"Vienne",
      date_service:ds,
      lavages_anterieurs:inc?"inconnu":parseInt(la)||0,
      lavages_depuis_app:enLavage?1:0,
      statut:"en_stock",  // toujours stock à la fin
      agent_actuel:statut==="en_service"?ag.toUpperCase()||null:null,
      date_derniere_action:today()
    };
    // "en_service" direct → en_service
    if(statut==="en_service") obj.statut="en_service";
    const opObj={grade,nom:nom.toUpperCase()};
    const extras=[];
    if(statut!=="en_stock"){
      extras.push({id:`EVT-${ts+1}`,date:today(),id_tenue:obj.id,
        action:"Affectation",portee_par:ag.toUpperCase(),grade_porteur:grade,enregistre_par:opObj});
    }
    if(enLavage){
      extras.push({id:`EVT-${ts+2}`,date:today(),id_tenue:obj.id,
        action:"Change-Lavage",portee_par:ag.toUpperCase(),
        tenue_souilee:obj.id,tenue_propre:(!pasDonChange&&donChange)||null,
        devenir:"stock",beneficiaire:null,enregistre_par:opObj});
    }
    const donneeChange=enLavage&&!pasDonChange&&donChange?{id:donChange,agent:ag.toUpperCase()}:null;
    setLastOp(opObj);
    onSave(obj,opObj,extras,donneeChange);
  };
  const ERowChange=({t})=>{
    const EI=t.type==="veste"?IMG_VESTE:IMG_PAN;
    const active=donChange===t.id;
    const n=lavN(t);const col=n>=50?"#DC2626":n>=45?"#D97706":"#16A34A";
    return <button onClick={()=>{setDonChange(active?"":t.id);setPasDonChange(false);}} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:active?T.navy:T.surface,border:`1.5px solid ${active?"transparent":T.border}`,borderRadius:8,cursor:"pointer",fontFamily:"inherit",marginBottom:3,width:"100%"}}>
      <img src={EI} alt="" style={{width:16,height:16,objectFit:"contain",flexShrink:0,filter:active?"brightness(10)":"none"}}/>
      <span style={{fontSize:12,fontWeight:700,color:active?"#fff":T.t1,flex:1,textAlign:"left",fontFamily:"'IBM Plex Mono',monospace"}}>{t.id}</span>
      <span style={{fontSize:9.5,fontWeight:800,color:active?"rgba(255,255,255,.65)":col}}>{n}/{seuilCR}</span>
    </button>;
  };
  return <Sheet onClose={onClose} title="Créer une tenue EPI" sub={prefill?`N° scanné : ${prefill}`:undefined}>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Field label="Type d'EPI">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[{v:"veste",l:"Veste de feu",img:IMG_VESTE},{v:"pantalon",l:"Pantalon de feu",img:IMG_PAN}].map(({v,l,img})=>(
            <button key={v} onClick={()=>pickType(v)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:7,padding:"13px 0",background:type===v?T.navy:T.surface,color:type===v?"#fff":T.t2,border:`1.5px solid ${type===v?"transparent":T.border}`,borderRadius:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12}}>
              <img src={img} alt="" style={{width:32,height:32,objectFit:"contain",filter:type===v?"brightness(10)":"none"}}/>
              {l}
            </button>
          ))}
        </div>
      </Field>
      <Field label="Numéro">
        {prefill
          ?<div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",background:T.navyLight,borderRadius:8,border:"1.5px solid rgba(15,30,56,0.20)"}}>
              <span style={{fontSize:15,fontWeight:800,color:T.navy,fontFamily:"'IBM Plex Mono',monospace",flex:1}}>{id}</span>
              <span style={{fontSize:9.5,fontWeight:700,color:"rgba(15,30,56,0.40)",letterSpacing:".08em"}}>SCANNÉ</span>
            </div>
          :<TInput value={id} onChange={e=>setId(e.target.value)} placeholder="VES-010" icon={Tag}/>
        }
      </Field>
      <Field label="Taille">
        {(()=>{
          const known=[...new Set(tenues.map(t=>t.taille).filter(Boolean).filter(x=>x!=="—"))].sort((a,b)=>["S","M","L","XL","XXL","3XL"].indexOf(a)-["S","M","L","XL","XXL","3XL"].indexOf(b));
          const showInput=taille&&!known.includes(taille);
          return <>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:6}}>
              {known.map(sz=><button key={sz} onClick={()=>setTaille(sz)} style={{padding:"4px 11px",borderRadius:99,border:`1.5px solid ${taille===sz?T.navy:T.border}`,background:taille===sz?T.navy:"transparent",color:taille===sz?"#fff":T.t2,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12}}>{sz}</button>)}
              <button onClick={()=>setTaille("")} style={{padding:"4px 11px",borderRadius:99,border:`1.5px dashed ${T.border}`,background:"transparent",color:T.t3,cursor:"pointer",fontFamily:"inherit",fontWeight:600,fontSize:12}}>+ Autre</button>
            </div>
            {(!known.includes(taille)||taille===""||showInput)&&<TInput value={taille} onChange={e=>setTaille(e.target.value.toUpperCase())} placeholder="Saisir une taille (ex: 42, 3XL…)"/>}
          </>;
        })()}
      </Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Mise en service"><TInput value={ds} onChange={e=>setDs(e.target.value)} type="date" icon={Calendar}/></Field>
        <Field label="Lavages antérieurs">{!inc?<TInput value={la} onChange={e=>setLa(e.target.value)} type="number" placeholder="0"/>:<div style={{padding:"8px 10px",background:T.bg,borderRadius:8,fontSize:12,color:T.t3}}>Inconnus</div>}</Field>
      </div>
      <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",marginTop:-4}}><input type="checkbox" checked={inc} onChange={e=>setInc(e.target.checked)} style={{width:14,height:14,accentColor:T.navy}}/><span style={{fontSize:12,color:T.t2}}>Lavages antérieurs inconnus</span></label>
      <Field label="Statut initial">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {[{v:"en_stock",l:"En stock",Ic:Package},{v:"en_service",l:"Attribué",Ic:User},{v:"en_lavage",l:"Envoyer lavage",Ic:Droplets}].map(({v,l,Ic})=>(
            <button key={v} onClick={()=>setStatut(v)} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,padding:"9px 6px",background:statut===v?T.navyLight:T.surface,color:statut===v?T.navy:T.t2,border:`1.5px solid ${statut===v?"rgba(15,30,56,0.22)":T.border}`,borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:11}}><Ic size={13}/>{l}</button>
          ))}
        </div>
        {statut!=="en_stock"&&<div style={{marginTop:8}}>
          <AgentInput value={ag} onChange={setAg} placeholder="NOM agent porteur" tenues={tenues}/>
        </div>}
      </Field>

      {/* Étape 2 : tenue de remplacement si envoyée au lavage */}
      {enLavage&&ag.trim()&&<Field label={`Tenue de remplacement pour ${ag||"l'agent"}`}>
        <div style={{padding:"6px 9px",background:"rgba(8,145,178,0.07)",borderRadius:7,border:"1px solid rgba(8,145,178,0.18)",fontSize:11,color:"#0891B2",fontWeight:600,marginBottom:6}}>
          La tenue part au lavage → stock auto. Donner une tenue propre à l'agent ?
        </div>
        {stksChange.length>0
          ?<div style={{maxHeight:130,overflowY:"auto"}}>{stksChange.map(t=><ERowChange key={t.id} t={t}/>)}</div>
          :<div style={{padding:"8px",background:"rgba(0,0,0,0.03)",borderRadius:7,fontSize:11,color:T.t3,fontStyle:"italic"}}>Aucune tenue en stock de ce type</div>
        }
        <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",marginTop:6,padding:"7px 9px",background:"rgba(0,0,0,0.03)",borderRadius:7}}>
          <input type="checkbox" checked={pasDonChange} onChange={e=>{setPasDonChange(e.target.checked);if(e.target.checked)setDonChange("");}}
            style={{width:14,height:14,accentColor:T.navy,flexShrink:0}}/>
          <span style={{fontSize:11.5,color:T.t2,fontWeight:600}}>Pas de tenue disponible pour l'instant</span>
        </label>
      </Field>}

      <OpRow grade={grade} setGrade={setGrade} nom={nom} setNom={setNom} onShowGrade={()=>setSg(true)}/>
      <BtnNavy onClick={save} disabled={!ok} icon={Plus} full style={{width:"100%",justifyContent:"center",padding:"9px 16px",fontSize:13}}>Créer la tenue</BtnNavy>
    </div>
    {sg&&<GradePicker value={grade} onChange={setGrade} onClose={()=>setSg(false)}/>}
  </Sheet>;
}

/* ──────────────────────────────────────────────────────
   ARCHIVE + EXPORT

function ArchiveSheet({tenue,onClose,onSave}){
  const [motif,setMotif]=useState("Tenue inopérationnelle"),[mc,setMc]=useState(""),[grade,setGrade]=useState("Adjudant"),[nom,setNom]=useState(""),[sg,setSg]=useState(false);

            <div style={{width:14,height:14,borderRadius:99,border:`2px solid ${motif===m?T.navy:"#CBD5E1"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{motif===m&&<div style={{width:5,height:5,borderRadius:99,background:T.navy}}/>}</div>{m}
          </button>

      </Field>
      <OpRow grade={grade} setGrade={setGrade} nom={nom} setNom={setNom} onShowGrade={()=>setSg(true)}/>
      <BtnWarn onClick={()=>onSave({motif:motif==="Autre"?mc:motif,grade,nom:nom.toUpperCase()})} icon={Archive} full style={{width:"100%",justifyContent:"center",padding:"9px 16px",fontSize:13}}>Confirmer l'archivage</BtnWarn>
    </div>
    {sg&&<GradePicker value={grade} onChange={setGrade} onClose={()=>setSg(false)}/>}
  </Sheet>;
}
function ExportSheet({tenues,histo,onClose}){
  const [done,setDone]=useState(false);
  const lav=t=>(t.lavages_anterieurs==="inconnu"?0:(parseInt(t.lavages_anterieurs)||0))+(parseInt(t.lavages_depuis_app)||0);
  const fmtD=v=>{if(!v)return"";const d=new Date(v);return isNaN(d)?v:d.toLocaleDateString("fr-FR");};


  const esc=v=>{const s=String(v===null||v===undefined?"":v).replace(/"/g,'""');return s.includes(",")||s.includes('"')||s.includes("\n")?`"${s}"`:s;};
  const downloadCsv=(rows,filename)=>{
    const csv=rows.map(r=>r.map(esc).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=filename;a.click();URL.revokeObjectURL(a.href);
  };
  const doExport=()=>{
    const dateStr=new Date().toISOString().split("T")[0];
    // CSV 1 — Tenues
    const headT=["N° tenue","Type","Taille","Statut","Agent actuel","Lavages total","Mise en service","Caserne"];
    const rowsT=[headT,...tenues.filter(t=>t.statut!=="supprime").map(t=>[
      t.id, t.type==="veste"?"Veste":"Pantalon", t.taille,
      {en_service:"En service",en_stock:"En stock",archive:"Archivée"}[t.statut]||t.statut,
      t.agent_actuel||"", lav(t), fmtD(t.date_service), t.caserne||""
    ])];
    downloadCsv(rowsT,`EPI_TRACK_tenues_${dateStr}.csv`);
    // CSV 2 — Historique (léger délai pour ne pas bloquer le premier téléchargement)
    setTimeout(()=>{
      const headH=["Date","N° tenue","Action","Agent/Porteur","Tenue souillée","Tenue propre","Devenir","Motif","Ancien lavages","Nouveau lavages","Enregistré par"];
      const rowsH=[headH,...[...(histo||[])].sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.id.localeCompare(b.id)).map(e=>[
        fmtD(e.date), e.id_tenue||"", e.action||"",
        e.portee_par||"", e.tenue_souilee||"", e.tenue_propre||"",
        e.devenir||"", e.motif||"",
        e.ancien!==undefined?e.ancien:"", e.nouveau!==undefined?e.nouveau:"",
        e.enregistre_par?(e.enregistre_par.grade+" "+e.enregistre_par.nom).trim():""
      ])];
      downloadCsv(rowsH,`EPI_TRACK_historique_${dateStr}.csv`);
    },400);
    setDone(true);
  };

  const actives=tenues.filter(t=>t.statut!=="supprime"&&t.statut!=="archive");
  const alertes=actives.filter(t=>lav(t)>=45);
  return <Sheet onClose={onClose} title="Export CSV" sub={new Date().toLocaleDateString("fr-FR")}>
    {!done?<div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{padding:"10px 12px",background:T.navyLight,borderRadius:9,border:`1px solid rgba(15,30,56,0.12)`}}>
        <div style={{fontSize:12,fontWeight:700,color:T.navy,marginBottom:4}}>Deux fichiers CSV seront téléchargés</div>
        <div style={{fontSize:11,color:T.t2,lineHeight:1.6}}>
          📄 <strong>EPI_TRACK_tenues.csv</strong> — {actives.length} tenues actives<br/>
          📄 <strong>EPI_TRACK_historique.csv</strong> — {histo.length} événements
        </div>
      </div>
      <div style={{fontSize:11,color:T.t3,padding:"7px 10px",background:"rgba(0,0,0,0.03)",borderRadius:7}}>
        Format UTF-8 avec BOM · Compatible Excel / Google Sheets
      </div>
      {alertes.length>0&&<div style={{padding:"8px 11px",background:T.warn.bg,borderRadius:8,border:`1px solid ${T.warn.bd}`,fontSize:11,color:T.warn.c,fontWeight:600}}>
        ⚠ {alertes.length} tenue{alertes.length>1?"s":""} à surveiller (≥45 lavages)
      </div>}
      <BtnNavy onClick={doExport} icon={FileSpreadsheet} full style={{width:"100%",justifyContent:"center",padding:"9px 16px",fontSize:13}}>Télécharger les CSV</BtnNavy>
    </div>:<div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{width:48,height:48,borderRadius:13,background:T.svc.bg,margin:"0 auto 11px",display:"flex",alignItems:"center",justifyContent:"center"}}><CheckCircle2 size={22} color={T.svc.c}/></div>

      <BtnGhost onClick={()=>{setDone(false);onClose();}}>Fermer</BtnGhost>
    </div>}
  </Sheet>;
}

          {[{l:"En service",v:fmt(t.date_service),Ic:Calendar},{l:"Caserne",v:t.caserne,Ic:Building2},{l:"Lavages",v:lavD(t),Ic:Droplets}].map(({l,v,Ic})=>(
            <div key={l} style={{display:"flex",gap:7}}>

        <div style={{flex:1,height:3,background:"rgba(0,0,0,0.06)",borderRadius:99,overflow:"hidden"}}>

/* ──────────────────────────────────────────────────────
   ALL VIEW
────────────────────────────────────────────────────── */
function AllView({tenues,onBack,onDetail,setOverlay,setPresel,initStatut,setAffectId}){
  const [fT,setFT]=useState("all"),[fS,setFS]=useState(initStatut||"all"),[sort,setSort]=useState("id"),[q,setQ]=useState(""),[viewMode,setViewMode]=useState("agents");
  const seuilAll=useSeuil(); // ← au niveau du composant, pas dans les callbacks
  const base=tenues.filter(t=>t.statut!=="supprime")
    .filter(t=>fT==="all"||t.type===fT)
    .filter(t=>fS==="all"||t.statut===fS)
    .filter(t=>!q||t.id.toLowerCase().includes(q.toLowerCase())||(t.agent_actuel||"").toLowerCase().includes(q.toLowerCase()));
  const filtered=base.sort((a,b)=>sort==="id"?a.id.localeCompare(b.id):sort==="lavages"?lavN(b)-lavN(a):(a.date_service||"").localeCompare(b.date_service||""));

  // Groupement par agent pour la vue "agents"
  const svcTenues=filtered.filter(t=>t.statut==="en_service");
  const stkTenues=filtered.filter(t=>t.statut==="en_stock");
  const arcTenues=filtered.filter(t=>t.statut==="archive");
  const agentGroups=(()=>{
    const map={};
    svcTenues.forEach(t=>{
      const k=t.agent_actuel||"(Sans agent)";
      if(!map[k])map[k]=[];
      map[k].push(t);
    });
    return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).map(([nom,ts])=>({
      nom,
      vestes:ts.filter(t=>t.type==="veste").sort((a,b)=>lavN(b)-lavN(a)),
      pantalons:ts.filter(t=>t.type==="pantalon").sort((a,b)=>lavN(b)-lavN(a)),
    }));
  })();

  const Pill=({l,active,onClick})=><button onClick={onClick} style={{padding:"4px 11px",borderRadius:99,border:`1.5px solid ${active?T.navy:T.border}`,background:active?T.navy:"transparent",color:active?"#fff":T.t2,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:11,whiteSpace:"nowrap",flexShrink:0}}>{l}</button>;

  const onChange=id=>{setPresel(id);setOverlay("change");};

  const showAgentView=viewMode==="agents";

  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{padding:"10px 14px 0",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <button onClick={onBack} style={{background:T.navyLight,border:"none",borderRadius:99,width:30,height:30,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:T.t2,flexShrink:0}}><ArrowLeft size={14}/></button>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:700,color:T.t1}}>All EPI <span style={{fontSize:10,color:T.t3,fontWeight:500}}>{filtered.length} tenue{filtered.length!==1?"s":""}</span></div>
        </div>
        {/* Vue toggle */}
        <div style={{display:"flex",background:T.bg,borderRadius:8,border:`1px solid ${T.border}`,overflow:"hidden",flexShrink:0}}>
          <button onClick={()=>setViewMode("agents")} style={{padding:"5px 9px",background:viewMode==="agents"?T.navy:"transparent",color:viewMode==="agents"?"#fff":T.t3,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:3,fontSize:10,fontWeight:700,fontFamily:"inherit"}}><User size={11}/>Agents</button>
          <button onClick={()=>setViewMode("liste")} style={{padding:"5px 9px",background:viewMode==="liste"?T.navy:"transparent",color:viewMode==="liste"?"#fff":T.t3,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:3,fontSize:10,fontWeight:700,fontFamily:"inherit"}}><BarChart3 size={11}/>Liste</button>
          <button onClick={()=>setViewMode("cartes")} style={{padding:"5px 9px",background:viewMode==="cartes"?T.navy:"transparent",color:viewMode==="cartes"?"#fff":T.t3,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:3,fontSize:10,fontWeight:700,fontFamily:"inherit"}}><Layers size={11}/>Cartes</button>
        </div>
        {/* Sort */}
        <div style={{display:"flex",gap:3,flexShrink:0}}>
          {[["id","N°"],["lavages","Lavages"],["date","Date"]].map(([v,l])=><button key={v} onClick={()=>setSort(v)} style={{padding:"4px 7px",borderRadius:99,border:`1.5px solid ${sort===v?"rgba(15,30,56,0.22)":T.border}`,background:sort===v?T.navyLight:"transparent",color:sort===v?T.navy:T.t3,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:9.5}}>{l}</button>)}
        </div>
      </div>
      <TInput value={q} onChange={e=>setQ(e.target.value)} placeholder="Filtrer par N°, agent…" icon={Search} style={{marginBottom:6}}/>
      <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:5}}>
        {[["all","Toutes"],["veste","Vestes"],["pantalon","Pantalons"]].map(([v,l])=><Pill key={v} l={l} active={fT===v} onClick={()=>setFT(v)}/>)}
        <div style={{width:1,height:20,background:T.border,flexShrink:0,alignSelf:"center"}}/>
        {[["all","Tous statuts"],["en_service","Service"],["en_stock","Stock"],["archive","Archivées"]].map(([v,l])=><Pill key={v} l={l} active={fS===v} onClick={()=>setFS(v)}/>)}
      </div>
    </div>

    <div style={{flex:1,overflowY:"auto",padding:"6px 14px 70px"}}>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"36px 0",color:T.t3,fontSize:12}}>Aucune tenue trouvée</div>}

      {/* ── VUE PAR AGENT ── */}
      {showAgentView&&<>
        {/* Section En service */}
        {(fS==="all"||fS==="en_service")&&agentGroups.length>0&&<>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,marginTop:2}}>
            <span style={{fontSize:9,fontWeight:800,color:T.svc.c,textTransform:"uppercase",letterSpacing:".13em"}}>En service</span>
            <span style={{fontSize:9,color:T.t4,fontWeight:600}}>{svcTenues.length} tenue{svcTenues.length!==1?"s":""}</span>
          </div>
          {agentGroups.map(({nom,vestes,pantalons})=>(
            <div key={nom} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,marginBottom:7,overflow:"hidden"}}>
              {/* Header agent */}
              <div style={{padding:"8px 12px",background:T.navyLight,borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:7}}>
                <div style={{width:22,height:22,borderRadius:99,background:T.navy,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <User size={11} color="#fff"/>
                </div>
                <span style={{fontSize:12.5,fontWeight:700,color:T.navy}}>{nom}</span>
                <span style={{fontSize:10,color:T.t3,marginLeft:"auto"}}>{vestes.length+pantalons.length} EPI</span>
              </div>
              {/* Lignes EPI */}
              <div style={{padding:"7px 10px"}}>
                {vestes.map(t=><AgentEpiRow key={t.id} t={t} onDetail={onDetail} onChange={onChange} setAffectId={setAffectId}/>)}
                {pantalons.map(t=><AgentEpiRow key={t.id} t={t} onDetail={onDetail} onChange={onChange} setAffectId={setAffectId}/>)}
                {vestes.length===0&&<div style={{fontSize:10,color:T.t4,padding:"2px 0",fontStyle:"italic"}}>— pas de veste</div>}
                {pantalons.length===0&&<div style={{fontSize:10,color:T.t4,padding:"2px 0",fontStyle:"italic"}}>— pas de pantalon</div>}
              </div>
            </div>
          ))}
        </>}

        {/* Séparateur */}
        {fS==="all"&&agentGroups.length>0&&stkTenues.length>0&&<div style={{display:"flex",alignItems:"center",gap:10,margin:"10px 0"}}>
          <div style={{flex:1,height:1,background:T.border}}/>
          <span style={{fontSize:9,fontWeight:700,color:T.t4,textTransform:"uppercase",letterSpacing:".1em"}}>Stock</span>
          <div style={{flex:1,height:1,background:T.border}}/>
        </div>}

        {/* Section En stock */}
        {(fS==="all"||fS==="en_stock")&&stkTenues.length>0&&<>
          {fS==="en_stock"&&<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,marginTop:2}}>
            <span style={{fontSize:9,fontWeight:800,color:T.stk.c,textTransform:"uppercase",letterSpacing:".13em"}}>En stock</span>
            <span style={{fontSize:9,color:T.t4,fontWeight:600}}>{stkTenues.length} tenue{stkTenues.length!==1?"s":""}</span>
          </div>}
          <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden"}}>
            {stkTenues.map((t,i)=>{
              const EPI=t.type==="veste"?IMG_VESTE:IMG_PAN;
              const seuil=seuilAll;
              const n=lavN(t),pct=Math.min(n/seuil*100,100);
              const col=lavColor(n,seuil);
              return <div key={t.id} onClick={()=>onDetail(t.id)} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 12px",borderBottom:i<stkTenues.length-1?`1px solid ${T.borderSub}`:"none",cursor:"pointer"}}>
                <img src={EPI} alt="" style={{width:22,height:22,objectFit:"contain",flexShrink:0}}/>
                <span style={{fontSize:12.5,fontWeight:800,color:T.t1,minWidth:72,fontFamily:"'IBM Plex Mono',monospace"}}>{t.id}</span>
                <span style={{fontSize:10,color:T.t3,minWidth:20}}>{t.taille}</span>
                <div style={{flex:1,display:"flex",alignItems:"center",gap:5}}>
                  <div style={{flex:1,height:3,background:"rgba(0,0,0,0.06)",borderRadius:99,overflow:"hidden"}}>
                    <div style={{width:`${pct}%`,height:"100%",background:col,borderRadius:99}}/>
                  </div>
                  <span style={{fontSize:9.5,fontWeight:800,color:col,flexShrink:0}}>{n}/{seuil}</span>
                </div>
                <button onClick={e=>{e.stopPropagation();setAffectId(t.id);}} style={{padding:"4px 10px",background:T.svc.bg,border:`1px solid ${T.svc.bd}`,borderRadius:7,fontSize:10,fontWeight:700,cursor:"pointer",color:T.svc.c,fontFamily:"inherit",display:"flex",alignItems:"center",gap:3,flexShrink:0}}><UserCheck size={10}/>Affecter</button>
              </div>;
            })}
          </div>
        </>}

        {/* Archivées */}
        {fS==="archive"&&arcTenues.length>0&&<>
          <div style={{fontSize:9,fontWeight:800,color:T.t3,textTransform:"uppercase",letterSpacing:".13em",marginBottom:8}}>Archivées</div>
          <div>{arcTenues.map(t=><CompactRow key={t.id} t={t} onDetail={onDetail} onChange={onChange} onAffect={id=>setAffectId(id)}/>)}</div>
        </>}

        {showAgentView&&filtered.length===0&&<div style={{textAlign:"center",padding:"36px 0",color:T.t3,fontSize:12}}>Aucune tenue trouvée</div>}
      </>}

      {/* ── VUE LISTE ── */}
      {viewMode==="liste"&&<div>{filtered.map(t=><CompactRow key={t.id} t={t} onDetail={onDetail} onChange={onChange} onAffect={id=>setAffectId(id)}/>)}</div>}

      {/* ── VUE CARTES ── */}
      {viewMode==="cartes"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:8}}>
        {filtered.map(t=><TenueCard key={t.id} t={t} onDetail={onDetail} onChange={onChange} onAffect={id=>setAffectId(id)}/>)}
      </div>}

    </div>
  </div>;
}


/* ──────────────────────────────────────────────────────
   AGENTS SHEET — profil, historique tenues, édition grade
────────────────────────────────────────────────────── */
function AgentsSheet({tenues,histo,onClose,onDetail,onChangeFor,onEditAgent}){
  const seuil=useSeuil();
  const [search,setSearch]=useState("");
  const [agentSel,setAgentSel]=useState(null);
  const [profileEdit,setProfileEdit]=useState(null);

  const gradeMap={};
  [...histo].sort((a,b)=>(a.date||"").localeCompare(b.date||"")||a.id.localeCompare(b.id))
    .forEach(e=>{if(e.portee_par&&e.grade_porteur)gradeMap[e.portee_par]=e.grade_porteur;});

  const agentMap={};
  tenues.filter(t=>t.agent_actuel&&t.statut==="en_service").forEach(t=>{
    if(!agentMap[t.agent_actuel])agentMap[t.agent_actuel]={nom:t.agent_actuel,grade:gradeMap[t.agent_actuel]||"",epi:[],actif:true};
    agentMap[t.agent_actuel].epi.push(t);
  });
  histo.forEach(h=>{
    if(h.portee_par&&!agentMap[h.portee_par])
      agentMap[h.portee_par]={nom:h.portee_par,grade:gradeMap[h.portee_par]||"",epi:[],actif:false};
  });
  const agents=Object.values(agentMap).sort((a,b)=>a.actif!==b.actif?a.actif?-1:1:a.nom.localeCompare(b.nom));
  const filtered=search.trim()?agents.filter(a=>a.nom.toLowerCase().includes(search.toLowerCase())):agents;

  const openAgent=a=>{
    const tenuesIds=[...new Set(histo.filter(h=>h.portee_par===a.nom).map(h=>h.id_tenue))];
    setAgentSel({...a,tenuesIds});
  };

  if(agentSel){
    const alertes=agentSel.epi.filter(t=>lavN(t)>=seuil).length;
    const tenuesHistoUniq=agentSel.tenuesIds||[];
    return <Sheet onClose={()=>setAgentSel(null)} title={agentSel.nom} sub={agentSel.grade||"Grade non renseigné"}>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 14px",background:`linear-gradient(135deg,${T.navyMid},${T.navy})`,borderRadius:12}}>
          <div style={{width:46,height:46,borderRadius:99,background:"rgba(255,255,255,0.10)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <User size={20} color="rgba(255,255,255,0.70)"/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:800,color:"#fff",lineHeight:1.2}}>{agentSel.nom}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:3}}>{agentSel.grade||"Grade non renseigné"}</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",marginTop:2}}>{agentSel.epi.length} EPI actif{agentSel.epi.length>1?"s":""} · {tenuesHistoUniq.length} tenues portées</div>
          </div>
          <button onClick={()=>setProfileEdit(agentSel)} style={{padding:"6px 12px",background:"rgba(255,255,255,0.10)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,cursor:"pointer",color:"rgba(255,255,255,0.75)",fontSize:11,fontWeight:700,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
            <Edit3 size={11}/>Modifier
          </button>
        </div>
        {alertes>0&&<div style={{padding:"8px 12px",background:T.warn.bg,border:`1px solid ${T.warn.bd}`,borderRadius:9,display:"flex",alignItems:"center",gap:8}}>
          <AlertTriangle size={13} color={T.warn.c}/><span style={{fontSize:11.5,fontWeight:700,color:T.warn.c}}>{alertes} tenue{alertes>1?"s":""} proche{alertes>1?"s":""} du seuil ({seuil})</span>
        </div>}
        {agentSel.epi.length>0&&<>
          <div style={{fontSize:9,fontWeight:800,color:T.t3,textTransform:"uppercase",letterSpacing:".13em"}}>EPI en service</div>
          {agentSel.epi.map(t=>{
            const EI=t.type==="veste"?IMG_VESTE:IMG_PAN;
            const n=lavN(t);const col=lavColor(n,seuil);
            return <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",background:T.surface,border:`1px solid ${n>=seuil?T.warn.bd:T.border}`,borderRadius:10}}>
              <img src={EI} alt="" style={{width:22,height:22,objectFit:"contain",flexShrink:0}}/>
              <span onClick={()=>{onDetail(t.id);onClose();}} style={{fontSize:12.5,fontWeight:800,color:T.t1,fontFamily:"'IBM Plex Mono',monospace",cursor:"pointer",flex:1}}>{t.id}</span>
              <span style={{fontSize:10,color:T.t3}}>{t.taille}</span>
              <div style={{width:55,height:3,background:"rgba(0,0,0,0.06)",borderRadius:99,overflow:"hidden"}}>
                <div style={{width:`${Math.min(n/seuil*100,100)}%`,height:"100%",background:col,borderRadius:99}}/>
              </div>
              <span style={{fontSize:9.5,fontWeight:800,color:col,minWidth:30,textAlign:"right"}}>{n}/{seuil}</span>
              <button onClick={()=>{onChangeFor(t.id);onClose();}} style={{width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,30,56,0.06)",border:`1px solid rgba(15,30,56,0.10)`,borderRadius:7,cursor:"pointer",flexShrink:0}}><Droplets size={12} color={T.navy}/></button>

          })}
        </>}
        <div style={{fontSize:9,fontWeight:800,color:T.t3,textTransform:"uppercase",letterSpacing:".13em"}}>Toutes les tenues portées</div>
        <div style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,overflow:"hidden"}}>
          {tenuesHistoUniq.length===0&&<div style={{padding:"14px",textAlign:"center",color:T.t3,fontSize:11,fontStyle:"italic"}}>Aucun historique</div>}
          {tenuesHistoUniq.map((id,i)=>{
            const t=tenues.find(x=>x.id===id);
            const evtsT=histo.filter(h=>h.id_tenue===id&&h.portee_par===agentSel.nom).sort((a,b)=>a.date.localeCompare(b.date));
            const firstAff=evtsT[0];

            const lastEvt=[...evtsT].reverse()[0];
            const EI=t?.type==="veste"?IMG_VESTE:IMG_PAN;
            return <div key={id} style={{display:"flex",alignItems:"center",gap:9,padding:"9px 12px",borderBottom:i<tenuesHistoUniq.length-1?`1px solid ${T.borderSub}`:"none",cursor:"pointer",background:isActive?"rgba(10,92,46,0.03)":"transparent"}} onClick={()=>{onDetail(id);onClose();}}>
              {EI&&<img src={EI} alt="" style={{width:22,height:22,objectFit:"contain",flexShrink:0,opacity:t?.statut==="archive"||t?.statut==="supprime"?.45:1}}/>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12.5,fontWeight:800,color:T.t1,fontFamily:"'IBM Plex Mono',monospace"}}>{id}</div>
                <div style={{fontSize:10,color:T.t3,marginTop:1}}>{firstAff?fmt(firstAff.date):""}{!isActive&&lastEvt?` → ${fmt(lastEvt.date)}`:" (actuel)"}</div>
              </div>
              {t?<Badge statut={t.statut}/>:<span style={{fontSize:9,color:T.t4}}>—</span>}
              <ArrowRight size={11} color={T.t4}/>
            </div>;
          })}
        </div>
      </div>
      {profileEdit&&<AgentProfileModal agent={profileEdit} onClose={()=>setProfileEdit(null)}
        onSave={p=>{onEditAgent(p);setProfileEdit(null);setAgentSel(null);onClose();}}/>}
    </Sheet>;
  }

  return <Sheet onClose={onClose} title="Agents" sub={`${agents.filter(a=>a.actif).length} équipés · ${agents.filter(a=>!a.actif).length} anciens`}>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <TInput value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher un agent…" icon={Search}/>
      {filtered.filter(a=>a.actif).length>0&&<>
        <div style={{fontSize:9,fontWeight:800,color:T.t3,textTransform:"uppercase",letterSpacing:".13em"}}>En service</div>
        {filtered.filter(a=>a.actif).map(a=>{
          const alertes=a.epi.filter(t=>lavN(t)>=seuil).length;
          return <button key={a.nom} onClick={()=>openAgent(a)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.surface,border:`1px solid ${alertes?T.warn.bd:T.border}`,borderRadius:10,cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%"}}>
            <div style={{width:36,height:36,borderRadius:99,background:alertes?T.warn.bg:T.navyLight,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>

            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:T.t1}}>{a.nom}</div>
              <div style={{fontSize:10,color:T.t3,marginTop:1}}>{a.grade||"Grade non renseigné"} · {a.epi.length} EPI</div>
            </div>
            {alertes>0&&<span style={{fontSize:9,fontWeight:800,color:T.warn.c,background:T.warn.bg,border:`1px solid ${T.warn.bd}`,padding:"2px 7px",borderRadius:99}}>⚠ {alertes}</span>}
            <ArrowRight size={12} color={T.t4}/>
          </button>;
        })}
      </>}
      {filtered.filter(a=>!a.actif).length>0&&<>
        <div style={{fontSize:9,fontWeight:800,color:T.t4,textTransform:"uppercase",letterSpacing:".13em",marginTop:4}}>Anciens porteurs</div>
        {filtered.filter(a=>!a.actif).map(a=>(
          <button key={a.nom} onClick={()=>openAgent(a)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"transparent",border:`1px solid ${T.borderSub}`,borderRadius:9,cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%",opacity:.75}}>
            <div style={{width:30,height:30,borderRadius:99,background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><User size={13} color={T.t3}/></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:T.t2}}>{a.nom}</div>
              <div style={{fontSize:10,color:T.t4,marginTop:1}}>{a.grade||"—"}</div>

    </div>
  </Sheet>;
}

/* ──────────────────────────────────────────────────────
   PERSISTENT SCAN BAR — toujours actif
────────────────────────────────────────────────────── */
function ScanBar({tenues,onDetail,onCreatePrefill,blocked}){
  const [q,setQ]=useState("");
  const [results,setResults]=useState([]);
  const [active,setActive]=useState(false);
  const inputRef=useRef(null);
  const scanTimer=useRef(null);
  const [focusIdx,setFocusIdx]=useState(-1);
  const listRef=useRef([]);
  const scanBuf=useRef("");
  const seuilB=useSeuil(); // ← déplacé ici (hooks interdits dans les callbacks)

  /* Focus input whenever no overlay is open - and on any click outside an input */
  useEffect(()=>{
    if(!blocked){
      const t=setTimeout(()=>inputRef.current?.focus(),80);
      return()=>clearTimeout(t);
    }
  },[blocked]);

  /* Re-focus on any click on the document that isn't an input/button */
  useEffect(()=>{
    if(blocked)return;
    const onClick=e=>{
      const tag=e.target.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||tag==="BUTTON"||tag==="SELECT")return;
      setTimeout(()=>inputRef.current?.focus(),50);
    };
    document.addEventListener("click",onClick);
    return()=>document.removeEventListener("click",onClick);
  },[blocked]);

  /* Global keydown: redirect ANY printable key to the input if not already focused */
  useEffect(()=>{
    if(blocked) return;
    const onKey=e=>{
      if(e.target===inputRef.current) return;
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT") return;
      if(e.metaKey||e.ctrlKey||e.altKey) return;
      if(e.key==="Enter"){
        inputRef.current?.focus();
        return;
      }
      if(e.key.length===1){
        e.preventDefault();
        inputRef.current?.focus();
        /* Inject the character directly into state so it is not lost */
        setQ(prev=>{
          const next=(prev+e.key).toUpperCase();
          /* Trigger results update */
          const r=tenues.filter(t=>t.statut!=="supprime"&&(
            t.id.toUpperCase().startsWith(next)||
            t.id.toUpperCase().includes(next)||
            (t.agent_actuel||"").toUpperCase().includes(next)
          )).sort((a,b)=>{
            const as=a.id.toUpperCase().startsWith(next)?0:1;
            const bs=b.id.toUpperCase().startsWith(next)?0:1;
            return as-bs||a.id.localeCompare(b.id);
          }).slice(0,8);
          setResults(r);
          const exact=tenues.find(t=>t.id.toUpperCase()===next&&t.statut!=="supprime");
          if(exact&&next.length>=4){
            clearTimeout(scanTimer.current);
            scanTimer.current=setTimeout(()=>{onDetail(exact.id);setQ("");setResults([]);},280);
          }
          return next;
        });
      }
    };
    document.addEventListener("keydown",onKey,true);
    return()=>document.removeEventListener("keydown",onKey,true);
  },[blocked,tenues,onDetail,onCreatePrefill]);

  const handleChange=val=>{
    setQ(val);
    if(val.trim().length>=1){
      const r=tenues.filter(t=>t.statut!=="supprime"&&(
        t.id.toLowerCase().startsWith(val.toLowerCase())||
        t.id.toLowerCase().includes(val.toLowerCase())||
        (t.agent_actuel||"").toLowerCase().includes(val.toLowerCase())
      )).sort((a,b)=>{
        const av=a.id.toLowerCase().startsWith(val.toLowerCase())?0:1;
        const bv=b.id.toLowerCase().startsWith(val.toLowerCase())?0:1;
        return av-bv||a.id.localeCompare(b.id);
      }).slice(0,8);
      setResults(r);
      /* Auto-navigate if exact match */
      const exact=tenues.find(t=>t.id.toLowerCase()===val.trim().toLowerCase()&&t.statut!=="supprime");
      if(exact&&val.length>=4){
        clearTimeout(scanTimer.current);
        scanTimer.current=setTimeout(()=>{onDetail(exact.id);setQ("");setResults([]);},340);
      }
    } else {setResults([]);clearTimeout(scanTimer.current);}
  };

  const go=()=>{
    clearTimeout(scanTimer.current);
    const v=q.trim();
    if(!v) return;
    const exact=tenues.find(t=>t.id.toUpperCase()===v.toUpperCase()&&t.statut!=="supprime");
    if(exact){onDetail(exact.id);setQ("");setResults([]);return;}
    if(results.length===1){onDetail(results[0].id);setQ("");setResults([]);return;}
    if(results.length===0){onCreatePrefill(v);setQ("");setResults([]);}
  };

  const n=lavN;
  return <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,position:"sticky",top:50,zIndex:90,flexShrink:0}}>
    <div style={{maxWidth:1360,margin:"0 auto",padding:"8px 14px",position:"relative"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,background:active?T.surface:T.bg,borderRadius:11,padding:"0 14px",border:`1.5px solid ${active||q?T.navy+"55":T.border}`,transition:"all .15s",boxShadow:active||q?`0 0 0 3px rgba(15,30,56,0.07)`:"none"}}>
        <Search size={14} color={q?T.navy:T.t3} style={{flexShrink:0}}/>
        <input ref={inputRef} value={q}
          onChange={e=>handleChange(e.target.value.toUpperCase())}
          onFocus={()=>setActive(true)}
          onBlur={()=>setActive(false)}
          onKeyDown={e=>{
            if(e.key==="Enter"){e.preventDefault();
              if(focusIdx>=0&&results[focusIdx]){onDetail(results[focusIdx].id);setQ("");setResults([]);setFocusIdx(-1);return;}
              go();
            }
            if(e.key==="Escape"){setQ("");setResults([]);setFocusIdx(-1);inputRef.current?.blur();}
            if(e.key==="ArrowDown"&&results.length>0){
              e.preventDefault();
              const next=Math.min(focusIdx+1,results.length-1);
              setFocusIdx(next);
              listRef.current[next]?.focus();
            }
            if(e.key==="ArrowUp"&&results.length>0){
              e.preventDefault();
              const prev=Math.max(focusIdx-1,-1);
              setFocusIdx(prev);
              if(prev===-1)inputRef.current?.focus();
              else listRef.current[prev]?.focus();
            }
          }}
          placeholder="Scanner ou saisir un N° de tenue…"
          style={{flex:1,border:"none",background:"transparent",fontSize:13.5,color:T.t1,outline:"none",padding:"11px 0",fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,letterSpacing:".03em"}}/>
        {q
          ?<button onClick={()=>{setQ("");setResults([]);clearTimeout(scanTimer.current);inputRef.current?.focus();}} style={{background:"none",border:"none",cursor:"pointer",color:T.t3,display:"flex",padding:3,borderRadius:5}}><X size={12}/></button>
          :<span style={{fontSize:9,color:T.t4,whiteSpace:"nowrap",letterSpacing:".04em"}}>SCAN · ENTRÉE</span>
        }
      </div>

      {/* Dropdown suggestions */}
      {(results.length>0||(q.length>=2&&results.length===0))&&<div style={{position:"absolute",top:"calc(100% + 1px)",left:14,right:14,background:T.surface,border:`1.5px solid ${T.navy+"33"}`,borderRadius:11,boxShadow:"0 12px 32px rgba(0,0,0,0.13)",zIndex:200,overflow:"hidden",animation:"popIn .13s ease"}}>
        {results.map((t,i)=>{
          const EI=t.type==="veste"?IMG_VESTE:IMG_PAN;
          const lv=lavN(t),col=lavColor(lv,seuilB);
          return <button key={t.id} ref={el=>listRef.current[i]=el}
            onKeyDown={e=>{
              if(e.key==="ArrowDown"){e.preventDefault();const nx=Math.min(i+1,results.length-1);setFocusIdx(nx);listRef.current[nx]?.focus();}
              if(e.key==="ArrowUp"){e.preventDefault();if(i===0){setFocusIdx(-1);inputRef.current?.focus();}else{setFocusIdx(i-1);listRef.current[i-1]?.focus();}}
              if(e.key==="Escape"){setQ("");setResults([]);setFocusIdx(-1);inputRef.current?.focus();}
            }}
            onMouseDown={e=>{e.preventDefault();onDetail(t.id);setQ("");setResults([]);setFocusIdx(-1);clearTimeout(scanTimer.current);}}
            style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"9px 14px",background:"none",border:"none",borderBottom:i<results.length-1?`1px solid ${T.borderSub}`:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left",transition:"background .1s"}}>
            <img src={EI} alt="" style={{width:20,height:20,objectFit:"contain",flexShrink:0}}/>
            <span style={{fontSize:13.5,fontWeight:800,color:T.t1,flex:1,fontFamily:"'IBM Plex Mono',monospace"}}>{t.id}</span>
            <span style={{fontSize:11,color:T.t3,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.taille}{t.agent_actuel?` · ${t.agent_actuel}`:""}</span>
            <Badge statut={t.statut}/>
            <span style={{fontSize:10.5,fontWeight:800,color:col,minWidth:32,textAlign:"right"}}>{lv}/{seuilB}</span>
          </button>;
        })}
        {results.length===0&&q.length>=2&&<div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:12,color:T.t3,flex:1}}>Aucune tenue <strong style={{fontFamily:"'IBM Plex Mono',monospace",color:T.t2}}>{q}</strong></span>
          <button onMouseDown={e=>{e.preventDefault();onCreatePrefill(q);setQ("");setResults([]);}}
            style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:T.navy,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12}}>
            <Plus size={12}/>Créer {q}
          </button>
        </div>}
      </div>}
    </div>
  </div>;
}

/* ──────────────────────────────────────────────────────
   TOAST
────────────────────────────────────────────────────── */
function Toast({msg,type}){
  const bg=type==="error"?T.red:type==="warn"?T.warn.c:T.svc.c;
  return <div style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"8px 16px",borderRadius:10,fontSize:12,fontWeight:700,zIndex:2000,boxShadow:"0 4px 16px rgba(0,0,0,0.18)",animation:"fadeUp .2s ease",pointerEvents:"none",whiteSpace:"nowrap"}}>{msg}</div>;
}

/* ──────────────────────────────────────────────────────
   ERROR BOUNDARY
────────────────────────────────────────────────────── */
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){console.error("EPI TRACK — erreur inattendue:",e,info);}
  render(){
    if(this.state.err)return(
      <div style={{minHeight:"100vh",background:"#F0F2F8",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,padding:24}}>
        <div style={{width:56,height:56,borderRadius:16,background:"#C8191A",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:"#0D1226",marginBottom:6}}>Une erreur inattendue s'est produite</div>
          <div style={{fontSize:12,color:"#8891AA",marginBottom:16,maxWidth:320}}>{this.state.err.message}</div>
          <button onClick={()=>window.location.reload()} style={{padding:"8px 20px",background:"#0F1E38",color:"#fff",border:"none",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Recharger l'application</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

/* ──────────────────────────────────────────────────────
   APP ROOT
────────────────────────────────────────────────────── */
function App(){
  const [view,setView]=useState("home");
  const [tenues,setTenues]=useState(DEMO?INIT_TENUES:[]);
  const [histo,setHisto]=useState(DEMO?INIT_HISTO:[]);
  const [loading,setLoading]=useState(!DEMO);
  const [selId,setSelId]=useState(null);
  const [overlay,setOverlay]=useState(null);
  const [master,setMaster]=useState(null);
  const [lastOp,setLastOp]=useState({grade:"Sergent",nom:""});
  const [toast,setToast]=useState(null);
  const [presel,setPresel]=useState(null);
  const [archPend,setArchPend]=useState(null);
  const [scanBuf,setScanBuf]=useState("");
  const [initStatut,setInitStatut]=useState("all");
  const [washEdit,setWashEdit]=useState(false);
  const [affectId,setAffectId]=useState(null);
  const [seuil,setSeuil]=useState(()=>parseInt(localStorage&&localStorage.getItem&&localStorage.getItem("epi_seuil")||"50")||50);
  const [seuilEdit,setSeuilEdit]=useState(false);
  const [agentEdit,setAgentEdit]=useState(null); // {nom,grade}
  const [evtDateEdit,setEvtDateEdit]=useState(null); // {id,date}
  const sel=tenues.find(t=>t.id===selId);

  useEffect(()=>{
    if(DEMO)return;
    /* On demande au GAS les 24 derniers mois (il peut ignorer si non implémenté).
       Côté client on filtre aussi : on garde toujours les Créations + événements
       des 24 derniers mois. Ça évite de charger 10 000 lignes après 2 ans d'usage. */
    const HISTO_MONTHS=24;
    apiCall("all",{months:HISTO_MONTHS}).then(d=>{
      if(!d)return;
      if(d.tenues&&d.tenues.length>0)setTenues(d.tenues.map(normTenue));
      if(d.historique&&d.historique.length>0){
        const cutoff=new Date();
        cutoff.setMonth(cutoff.getMonth()-HISTO_MONTHS);
        const cutoffStr=cutoff.toISOString().split("T")[0];
        const filtered=d.historique.filter(h=>
          h.action==="Création"||(h.date&&(toISO(h.date)||h.date)>=cutoffStr)
        );
        setHisto(filtered.map(h=>({...h,date:toISO(h.date)||h.date})));
      }
    }).finally(()=>setLoading(false));
  },[]);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};
  const openDetail=id=>{setSelId(id);setView("detail");};
  const openChange=id=>{setPresel(id||null);setOverlay("change");};
  const saveAffect=({agent,date,enregistre_par})=>{
    const id=affectId;
    setTenues(p=>p.map(t=>t.id===id?{...t,statut:"en_service",agent_actuel:agent,date_derniere_action:date}:t));
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date,id_tenue:id,action:"Affectation",portee_par:agent,grade_porteur:enregistre_par.grade,enregistre_par}]);
    setAffectId(null);showToast(`${id} affectée à ${agent}`);
    apiCall("affectTenue",{id,agent_actuel:agent,date,grade_op:enregistre_par.grade,nom_op:enregistre_par.nom});
  };

  const saveTenue=(t,op,extraEvents=[],donneeChange=null)=>{
    if(tenues.find(x=>x.id===t.id)){showToast("N° déjà existant","error");return;}
    const ts=Date.now();
    // Si une tenue de remplacement est donnée, on l'affecte en service
    setTenues(p=>{
      const base=[...p,t];
      if(!donneeChange) return base;
      return base.map(x=>x.id===donneeChange.id?{...x,statut:"en_service",agent_actuel:donneeChange.agent,date_derniere_action:today()}:x);
    });
    const baseEvt={id:`EVT-${ts}`,date:today(),id_tenue:t.id,action:"Création",statut_initial:t.statut,enregistre_par:{grade:op.grade,nom:op.nom}};
    const allEvts=[baseEvt,...extraEvents];
    if(donneeChange){
      // Affectation de la tenue de remplacement
      allEvts.push({id:`EVT-${ts+20}`,date:today(),id_tenue:donneeChange.id,action:"Affectation",portee_par:donneeChange.agent,grade_porteur:op.grade,enregistre_par:op});
    }
    setHisto(p=>[...p,...allEvts]);
    setOverlay(null);setScanBuf("");showToast(`Tenue ${t.id} créée`);
    apiCall("saveTenue", {
  ...t,
  grade_op: op.grade,
  nom_op: op.nom,
  extraEvents: extraEvents,
});
  };
  const saveChange=({id_tenue_rendue,id_tenue_donnee,agent_nom,devenir,beneficiaire_direct,date,enregistre_par})=>{
    // Bloquer si le dernier événement significatif de cette tenue est déjà un lavage
    const evtsTenue=[...histo].filter(h=>h.id_tenue===id_tenue_rendue)
      .sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
    // Ignorer les "Retour stock auto" pour trouver le vrai dernier événement
    const dernierEvt=evtsTenue.find(h=>!(h.action==="Retour stock"&&h.auto));
    if(dernierEvt&&dernierEvt.action==="Change-Lavage"){
      showToast("Cette tenue a déjà été lavée — affectez-la d'abord avant un nouveau lavage","error");
      return;
    }
    const ts=Date.now();
    setTenues(p=>p.map(t=>{
      // Tenue rendue : +1 lavage → toujours stock, désaffectée
      if(t.id===id_tenue_rendue) return{...t,lavages_depuis_app:t.lavages_depuis_app+1,
        statut:"en_stock",agent_actuel:null,date_derniere_action:date};
      // Tenue propre donnée : affectée à l'agent
      if(id_tenue_donnee&&t.id===id_tenue_donnee) return{...t,statut:"en_service",agent_actuel:agent_nom,date_derniere_action:date};
      return t;
    }));
    const newEvts=[
      // 1. Lavage sur la tenue rendue
      {id:`EVT-${ts}`,date,id_tenue:id_tenue_rendue,
        action:"Change-Lavage",portee_par:agent_nom,
        tenue_souilee:id_tenue_rendue,tenue_propre:id_tenue_donnee||null,
        enregistre_par},
      // 2. Mise en stock automatique sur la tenue rendue (ligne distincte)
      {id:`EVT-${ts+1}`,date,id_tenue:id_tenue_rendue,
        action:"Retour stock",portee_par:agent_nom,auto:true,enregistre_par},
    ];
    // 3. Affectation sur la tenue propre donnée
    if(id_tenue_donnee){
      newEvts.push({id:`EVT-${ts+2}`,date,id_tenue:id_tenue_donnee,
        action:"Affectation",portee_par:agent_nom,
        grade_porteur:enregistre_par?.grade||"",
        enregistre_par});
    }
    setHisto(p=>[...p,...newEvts]);
    setOverlay(null);showToast("Change enregistré");
    apiCall("saveChange",{id_tenue_rendue,id_tenue_donnee,agent_nom,date,grade_op:enregistre_par.grade,nom_op:enregistre_par.nom});
  };
  const archiveTrigger=()=>{setArchPend(sel);setMaster({action:"archiver cette tenue",cb:()=>{setMaster(null);setOverlay("archive");}});};
  const deleteTrigger=()=>{setMaster({action:"supprimer définitivement",cb:()=>{
    const id=selId;
    setTenues(p=>p.map(t=>t.id===id?{...t,statut:"supprime",supprime_le:today()}:t));
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date:today(),id_tenue:id,action:"Suppression",enregistre_par:{grade:"—",nom:"—"}}]);
    setMaster(null);setView("home");showToast("Tenue supprimée","error");
    apiCall("deleteTenue",{id});
  }});};
  const saveArchive=({motif,grade,nom})=>{
    setTenues(p=>p.map(t=>t.id===selId?{...t,statut:"archive",motif_archive:motif,date_derniere_action:today()}:t));
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date:today(),id_tenue:selId,action:"Archivage",motif,enregistre_par:{grade,nom}}]);
    const id=selId;
    setOverlay(null);setView("home");showToast("Tenue archivée");
    apiCall("archiveTenue",{id,motif,grade_op:grade,nom_op:nom});
  };
  const editWashTrigger=()=>{setMaster({action:"corriger le compteur de lavages",cb:()=>{setMaster(null);setWashEdit(true);}});};
  const saveWash=n=>{
    const ancien=lavN(sel);
    setTenues(p=>p.map(t=>t.id!==selId?t:{...t,lavages_anterieurs:0,lavages_depuis_app:n,date_derniere_action:today()}));
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date:today(),id_tenue:selId,action:"Correction lavages",ancien,nouveau:n,enregistre_par:{grade:"—",nom:"—"}}]);
    setWashEdit(false);showToast(`Lavages corrigés : ${n} total`);
    apiCall("correctWash",{id:selId,nouveau:n});
  };
  const saveSeuil=n=>{
    setSeuil(n);
    try{if(typeof localStorage!=="undefined")localStorage.setItem("epi_seuil",String(n));}catch(e){}
    setSeuilEdit(false);showToast(`Seuil fixé à ${n} lavages`);
  };
  const saveAgentEdit=({oldNom,newNom,grade})=>{
    setTenues(p=>p.map(t=>t.agent_actuel===oldNom?{...t,agent_actuel:newNom}:t));
    setHisto(p=>p.map(h=>h.portee_par!==oldNom?h:{...h,portee_par:newNom,grade_porteur:grade}));
    showToast(`Agent mis à jour : ${newNom}`);
    apiCall("renameAgent",{oldNom,newNom,grade});
  };
  const saveEvtDate=(evtId,newDate)=>{
    const evt=histo.find(h=>h.id===evtId);
    setHisto(p=>p.map(h=>h.id===evtId?{...h,date:newDate}:h));
    if(evt)setTenues(p=>p.map(t=>t.id===evt.id_tenue&&t.date_derniere_action===evt.date?{...t,date_derniere_action:newDate}:t));
    setEvtDateEdit(null);showToast("Date corrigée");
    apiCall("editEvtDate",{id:evtId,newDate});
  };
  const openEvtDateEdit=evt=>setMaster({action:"modifier la date de cet événement",cb:()=>{setMaster(null);setEvtDateEdit(evt);}});

  if(loading)return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
      <div style={{width:60,height:60,borderRadius:16,background:"#0F1E38",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <img src={IMG_LOGO} alt="" style={{height:46,objectFit:"contain"}}/>
      </div>
      <div style={{fontSize:15,fontWeight:700,color:"#0D1226"}}>EPI TRACK</div>
      <div style={{fontSize:11,color:"#8891AA"}}>Chargement depuis Google Sheets…</div>
    </div>
  );
  return <SeuilCtx.Provider value={seuil}><div style={{height:"100vh",background:T.bg,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <style>{`
      *{box-sizing:border-box;margin:0;padding:0;font-family:'IBM Plex Sans',-apple-system,sans-serif;}
      @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
      @keyframes fadeUp{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
      @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
      @keyframes popIn{from{transform:scale(0.96);opacity:0}to{transform:scale(1);opacity:1}}
      input:focus{border-color:rgba(15,30,56,0.30)!important;box-shadow:0 0 0 3px rgba(15,30,56,0.07)!important;outline:none}
      input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
      button:active{opacity:.80;transform:scale(.97)}
      button:hover{opacity:.88}
      ::-webkit-scrollbar{width:3px;height:3px}
      ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:99px}
      @media(min-width:900px){.desktop-cols{display:grid!important;grid-template-columns:320px 1fr;gap:0;overflow:hidden;flex:1}}
    `}</style>

    <header style={{background:T.navy,position:"sticky",top:0,zIndex:100,flexShrink:0}}>
      <div style={{maxWidth:1360,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",gap:10,height:50}}>
