const fmt=v=>{const iso=toISO(v);if(!iso)return"—";const[y,m,d]=iso.split("-");return`${d}/${m}/${y}`;};
const today=()=>new Date().toISOString().split("T")[0];

/* ──────────────────────────────────────────────────────
   GRADE ICON
────────────────────────────────────────────────────── */
function GradeIcon({grade,size=28}){
  const S=size,r2=Math.max(2,S*0.08);
  const uid=`gi${grade.replace(/[^a-z]/gi,"")}${S}`;
  const R="#E82018",W="#F8F6F4",O="#F5A800",K="#1A0800",L=0.55;
  const stripe=(x,mc,oc,mw=.13,ow=.21)=>{const cx=S/2+x,x1=cx-L*(S/2),y1=S,x2=cx+L*(S/2),y2=0;return <g key={x}>{oc&&<line x1={x1} y1={y1} x2={x2} y2={y2} stroke={oc} strokeWidth={S*ow}/>}<line x1={x1} y1={y1} x2={x2} y2={y2} stroke={mc} strokeWidth={S*mw}/></g>;};
  const stripes=(n,mc,oc=null)=>{const sp=S*.22;return({1:[0],2:[-sp/2,sp/2],3:[-sp,0,sp]}[n]||[0]).map(o=>stripe(o,mc,oc));};
  const hBars=bars=>{const gap=S*.065,px=S*.12,th=bars.reduce((a,b)=>a+b.h*S,0)+(bars.length-1)*gap;let y=(S-th)/2;return bars.map((b,i)=>{const bh=b.h*S,el=<rect key={i} x={px} y={y} width={S-px*2} height={bh} fill={b.c}/>;y+=bh+gap;return el;});};
  const frame=(c=W,w=2)=><rect x={w/2} y={w/2} width={S-w} height={S-w} rx={r2} fill="none" stroke={c} strokeWidth={w}/>;
  let cnt=null,brd=null;
  if(grade==="Sapeur 1re cl."){cnt=stripes(1,R,null,.20);brd=frame();}
  else if(grade==="Caporal"){cnt=stripes(2,R,null,.16);brd=frame();}
  else if(grade==="Caporal-Chef"){cnt=stripes(3,R,null,.13);brd=frame();}
  else if(grade==="Sergent"){cnt=stripes(1,R,W,.13,.22);}
  else if(grade==="Sergent-Chef"){cnt=stripes(3,R,W,.10,.17);}
  else if(grade==="Adjudant"){const bH=S*.28,bY=(S-bH)/2,rH=S*.07,rY=(S-rH)/2,px=S*.10;cnt=[<rect key="o" x={px} y={bY} width={S-px*2} height={bH} fill={O}/>,<rect key="r" x={px} y={rY} width={S-px*2} height={rH} fill={R}/>];}
  else if(grade==="Adjudant-Chef"){const bH=S*.28,bY=(S-bH)/2,rH=S*.07,rY=(S-rH)/2,px=S*.10;cnt=[<rect key="w" x={px} y={bY} width={S-px*2} height={bH} fill={W}/>,<rect key="r" x={px} y={rY} width={S-px*2} height={rH} fill={R}/>];}
  else if(grade==="Lieutenant"){cnt=hBars([{c:W,h:.14},{c:W,h:.14}]);brd=frame();}
  else if(grade==="Capitaine"){cnt=hBars([{c:W,h:.12},{c:W,h:.12},{c:W,h:.12}]);brd=frame();}
  else if(grade==="Commandant"){cnt=hBars([{c:W,h:.10},{c:W,h:.10},{c:W,h:.10},{c:W,h:.10}]);brd=frame();}
  else if(grade==="Lieutenant-Colonel"){cnt=hBars([{c:W,h:.09},{c:O,h:.09},{c:W,h:.09},{c:O,h:.09},{c:W,h:.09}]);brd=frame();}
  else if(grade==="Colonel"){cnt=hBars([{c:W,h:.09},{c:W,h:.09},{c:W,h:.09},{c:W,h:.09},{c:W,h:.09}]);brd=frame();}
  return <svg width={S} height={S} viewBox={`0 0 ${S} ${S}`} style={{flexShrink:0,display:"block"}}><defs><clipPath id={uid}><rect x={0} y={0} width={S} height={S} rx={r2}/></clipPath></defs><rect x={0} y={0} width={S} height={S} rx={r2} fill={K}/><g clipPath={`url(#${uid})`}>{cnt}</g>{brd}</svg>;
}

      <BtnGhost onClick={onClose} full style={{width:"100%",justifyContent:"center",marginTop:6}}>Annuler</BtnGhost>

}

    if(n>99){setErr("Maximum 99");return;}
    onSave(n);

  const cur=lavN(tenue);
  return <div style={{position:"fixed",inset:0,background:"rgba(8,12,26,0.65)",backdropFilter:"blur(8px)",zIndex:1100,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>

        <div style={{fontSize:11.5,color:T.t3,marginTop:3}}>{tenue.id} · actuellement {cur} lavage{cur>1?"s":""}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"center",marginBottom:10}}>
        <button onClick={()=>setVal(v=>{const n=Math.max(0,parseInt(v||0)-1);return String(n);})} style={{width:36,height:36,borderRadius:99,background:T.bg,border:`1.5px solid ${T.border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}><Minus size={15} color={T.t2}/></button>

      </div>
      {err&&<p style={{color:T.red,fontSize:11,textAlign:"center",marginBottom:8,fontWeight:700}}>{err}</p>}
      <div style={{height:6,background:"rgba(0,0,0,0.06)",borderRadius:99,overflow:"hidden",marginBottom:14}}>
        <div style={{width:`${Math.min((parseInt(val)||0)/50*100,100)}%`,height:"100%",background:(parseInt(val)||0)>=50?"#DC2626":(parseInt(val)||0)>=45?"#D97706":"#16A34A",borderRadius:99,transition:"width .2s"}}/>

  const [open,setOpen]=useState(false);
  const tSuil=tenues.find(t=>t.id===evt.tenue_souilee)||null;
  const tProp=tenues.find(t=>t.id===evt.tenue_propre)||null;
  const conf={
    "Change-Lavage":{Ico:ArrowLeftRight,c:T.stk.c,bg:T.stk.bg,bd:T.stk.bd,label:"Change · Lavage"},
    "Création":{Ico:Plus,c:T.svc.c,bg:T.svc.bg,bd:T.svc.bd,label:"Mise en service"},
    "Affectation":{Ico:UserCheck,c:T.svc.c,bg:T.svc.bg,bd:T.svc.bd,label:"Affectation"},
    "Archivage":{Ico:Archive,c:T.warn.c,bg:T.warn.bg,bd:T.warn.bd,label:"Archivage"},
    "Suppression":{Ico:Trash2,c:T.del.c,bg:T.del.bg,bd:T.del.bd,label:"Suppression"},
    "Correction lavages":{Ico:Edit3,c:T.t3,bg:"rgba(0,0,0,0.05)",bd:T.border,label:"Correction"},
  }[evt.action]||{Ico:Edit3,c:T.t3,bg:"rgba(0,0,0,0.05)",bd:T.border,label:evt.action};
  const {Ico,c,bg,bd,label}=conf;
  return <div style={{display:"flex",gap:10,position:"relative"}}>
    {!isLast&&<div style={{position:"absolute",left:12,top:26,bottom:-12,width:1.5,background:`linear-gradient(to bottom,${bd},transparent)`}}/>}
    <div style={{width:25,height:25,borderRadius:7,background:bg,border:`1.5px solid ${bd}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1,zIndex:1}}><Ico size={11} color={c}/></div>
    <div style={{flex:1,background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,marginBottom:isLast?0:12,overflow:"hidden"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",padding:"8px 12px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:8,textAlign:"left"}}>
        <span style={{fontSize:11,fontWeight:700,color:c,flex:1}}>{label}</span>

      </button>
      {open&&<div style={{borderTop:`1px solid ${T.borderSub}`,padding:"10px 12px 11px",display:"flex",flexDirection:"column",gap:7}}>
        {evt.action==="Change-Lavage"&&<>
          {/* Ligne 1 : qui portait */}
          <div style={{display:"flex",alignItems:"center",gap:8}}>

            <span style={{fontSize:12.5,fontWeight:700,color:T.t1}}>{evt.portee_par||"—"}</span>

          </div>

          {/* Ligne 2 : tenue souillée rendue → destin */}
          <div style={{display:"flex",alignItems:"center",gap:8}}>

            <span style={{fontSize:12,fontWeight:700,color:T.t1,fontFamily:"'IBM Plex Mono',monospace"}}>{evt.tenue_souilee||"—"}</span>
            <span style={{fontSize:10,color:T.t3,flex:1}}>{tSuil?`${tSuil.type==="veste"?"veste":"pantalon"} · ${tSuil.taille}`:""}</span>
            {evt.devenir==="stock"
              ?<span style={{fontSize:9.5,fontWeight:700,padding:"2px 7px",borderRadius:99,background:T.stk.bg,color:T.stk.c,border:`1px solid ${T.stk.bd}`,whiteSpace:"nowrap"}}>→ stock</span>

          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:9,fontWeight:800,color:T.t3,textTransform:"uppercase",letterSpacing:".10em",width:64,flexShrink:0}}>Propre</span>

        {evt.action==="Création"&&<div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:9,fontWeight:800,color:T.t3,textTransform:"uppercase",letterSpacing:".10em",width:64,flexShrink:0}}>Statut</span>
          <span style={{fontSize:12.5,fontWeight:700,color:T.t1}}>{evt.statut_initial==="en_service"?"En service":"Mise en stock"}</span>
        </div>}
        {evt.action==="Affectation"&&evt.portee_par&&<div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:9,fontWeight:800,color:T.t3,textTransform:"uppercase",letterSpacing:".10em",width:64,flexShrink:0}}>Agent</span>
          <span style={{fontSize:12.5,fontWeight:700,color:T.t1}}>{evt.portee_par}</span>
          {evt.grade_porteur&&<span style={{fontSize:10,color:T.t3}}>· {evt.grade_porteur}</span>}
        </div>}
        {evt.action==="Archivage"&&<div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:9,fontWeight:800,color:T.t3,textTransform:"uppercase",letterSpacing:".10em",width:64,flexShrink:0}}>Motif</span>
          <span style={{fontSize:12.5,fontWeight:700,color:T.warn.c}}>{evt.motif||"Non précisé"}</span>
        </div>}
        {evt.action==="Correction lavages"&&<div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:9,fontWeight:800,color:T.t3,textTransform:"uppercase",letterSpacing:".10em",width:64,flexShrink:0}}>Lavages</span>
          <span style={{fontSize:12.5,fontWeight:700,color:T.t1}}>{evt.ancien} → {evt.nouveau}</span>
        </div>}
        {evt.enregistre_par&&<div style={{paddingTop:6,borderTop:`1px dashed ${T.borderSub}`,display:"flex",alignItems:"center",gap:5,marginTop:1}}>
          <GradeIcon grade={evt.enregistre_par.grade} size={13}/>
          <span style={{fontSize:9.5,color:T.t3}}>Par <strong style={{color:T.t2}}>{evt.enregistre_par.nom}</strong> · {evt.enregistre_par.grade}</span>
        </div>}
      </div>}
    </div>
  </div>;
}

/* ──────────────────────────────────────────────────────
   SMART SEARCH — cherche d'abord, propose créer si rien
────────────────────────────────────────────────────── */
function SmartSearch({tenues,onDetail,onCreatePrefill,onClose}){
  const [q,setQ]=useState("");
  const inputRef=useRef(null);
  useEffect(()=>{inputRef.current?.focus();},[]);

  const results=q.trim().length>=1
    ? tenues.filter(t=>t.statut!=="supprime"&&(
        t.id.toLowerCase().includes(q.toLowerCase())||
        (t.agent_actuel||"").toLowerCase().includes(q.toLowerCase())
      )).slice(0,8)
    : [];

  const exactMatch=tenues.find(t=>t.id.toLowerCase()===q.trim().toLowerCase());

  return <div style={{position:"fixed",inset:0,background:"rgba(8,12,26,0.50)",backdropFilter:"blur(5px)",zIndex:800,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:60,paddingLeft:16,paddingRight:16}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:500,background:T.surface,borderRadius:14,border:`1px solid ${T.border}`,boxShadow:"0 16px 48px rgba(0,0,0,0.16)",overflow:"hidden",animation:"popIn .18s ease"}}>
      {/* Search input */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderBottom:`1px solid ${T.borderSub}`}}>
        <Search size={15} color={T.t3}/>
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value.toUpperCase())} placeholder="N° de tenue, agent…"
          style={{flex:1,border:"none",background:"transparent",fontSize:14,color:T.t1,outline:"none",fontFamily:"'IBM Plex Mono',monospace"}}/>
        {q&&<button onClick={()=>setQ("")} style={{background:"none",border:"none",cursor:"pointer",color:T.t3,display:"flex"}}><X size={13}/></button>}
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:T.t3,padding:"2px 6px",fontSize:11,fontFamily:"inherit"}}>Esc</button>
      </div>

      {/* Results */}
      {q.trim().length>=1&&<div style={{maxHeight:320,overflowY:"auto"}}>
        {results.length>0&&results.map(t=>{
          const EI=t.type==="veste"?IMG_VESTE:IMG_PAN;
          const n=lavN(t),col=n>=50?"#DC2626":n>=45?"#D97706":"#16A34A";
          return <button key={t.id} onClick={()=>{onDetail(t.id);onClose();}}
            style={{display:"flex",alignItems:"center",gap:11,width:"100%",padding:"10px 14px",background:"none",border:"none",borderBottom:`1px solid ${T.borderSub}`,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}}>
            <div style={{width:32,height:32,background:T.bg,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1px solid ${T.border}`}}>
              <img src={EI} alt="" style={{width:24,height:24,objectFit:"contain"}}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:700,color:T.t1,fontFamily:"'IBM Plex Mono',monospace"}}>{t.id}</div>
              <div style={{fontSize:10.5,color:T.t3,marginTop:1}}>{t.type==="veste"?"Veste":"Pantalon"} · {t.taille}{t.agent_actuel?` · ${t.agent_actuel}`:""}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
              <Badge statut={t.statut}/>
              <span style={{fontSize:10,fontWeight:700,color:col}}>{n}/50</span>
            </div>
          </button>;
        })}

        {/* Aucun résultat → proposer création */}
        {results.length===0&&<div style={{padding:"16px 14px",display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontSize:12.5,color:T.t3,textAlign:"center"}}>Aucune tenue trouvée pour <strong style={{color:T.t2,fontFamily:"'IBM Plex Mono',monospace"}}>{q}</strong></div>
          <button onClick={()=>{onCreatePrefill(q);onClose();}}
            style={{display:"flex",alignItems:"center",justifyContent:"center",gap:7,padding:"10px",background:T.navy,color:"#fff",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:13}}>
            <Plus size={14}/>Créer la tenue {q}
          </button>
        </div>}
      </div>}

      {q.trim().length===0&&<div style={{padding:"14px",display:"flex",flexDirection:"column",gap:5}}>
        <div style={{fontSize:10,color:T.t3,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",marginBottom:3}}>Tenues récentes</div>

function ArchiveSheet({tenue,onClose,onSave}){
  const [motif,setMotif]=useState("Tenue inopérationnelle"),[mc,setMc]=useState(""),[grade,setGrade]=useState("Adjudant"),[nom,setNom]=useState(""),[sg,setSg]=useState(false);

            <div style={{width:14,height:14,borderRadius:99,border:`2px solid ${motif===m?T.navy:"#CBD5E1"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{motif===m&&<div style={{width:5,height:5,borderRadius:99,background:T.navy}}/>}</div>{m}
          </button>

      <BtnWarn onClick={()=>onSave({motif:motif==="Autre"?mc:motif,grade,nom:nom.toUpperCase()})} icon={Archive} full style={{width:"100%",justifyContent:"center",padding:"9px 16px",fontSize:13}}>Confirmer l'archivage</BtnWarn>
    </div>
    {sg&&<GradePicker value={grade} onChange={setGrade} onClose={()=>setSg(false)}/>}

}
function ExportSheet({tenues,histo,onClose}){
  const [sel,setSel]=useState({recap:true,actives:true,alertes:true,histo:true,archivees:false});
  const [done,setDone]=useState(false);
  const lav=t=>(t.lavages_anterieurs==="inconnu"?0:(parseInt(t.lavages_anterieurs)||0))+(parseInt(t.lavages_depuis_app)||0);
  const fmtD=v=>{if(!v)return"—";const d=new Date(v);return isNaN(d)?v:d.toLocaleDateString("fr-FR");};
  const SECS=[
    {k:"recap",    l:"Récapitulatif global",        d:"KPIs en un coup d'œil"},
    {k:"actives",  l:"Tenues actives + historique", d:"Tableau complet avec tous les events"},
    {k:"alertes",  l:"Alertes ≥ 45 lavages",        d:"Tenues à surveiller"},
    {k:"histo",    l:"Historique complet",           d:"Tous les événements"},
    {k:"archivees",l:"Tenues archivées",             d:"Retirées du service"},
  ];
  const badge=s=>({en_service:'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:#dcfce7;color:#166534">En service</span>',en_stock:'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:#dbeafe;color:#1e40af">En stock</span>',archive:'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:#fef3c7;color:#78350f">Archivée</span>'}[s]||s);
  const bar=t=>{const p=Math.min(100,Math.round(lav(t)/50*100));const c=p>=90?"#C8191A":p>=70?"#F97316":"#16A34A";return `<div style="display:flex;align-items:center;gap:5px"><div style="width:70px;height:6px;background:#e5e7eb;border-radius:99px;overflow:hidden"><div style="width:${p}%;height:100%;background:${c}"></div></div><span style="font-size:10px;font-weight:700;color:${c}">${lav(t)}/50</span></div>`;};
  const AL={"Création":"🆕","Change-Lavage":"🔄","Affectation":"👤","Archivage":"📦","Suppression":"🗑","Retour stock":"↩","Correction lavages":"✏️"};
  const TH=cols=>`<tr>${cols.map(c=>`<th style="text-align:left;padding:8px;background:#0F1E38;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase">${c}</th>`).join("")}</tr>`;

  const doExport=()=>{
    const date=new Date().toLocaleDateString("fr-FR");
    const actives=tenues.filter(t=>t.statut!=="supprime"&&t.statut!=="archive");
    const alertes=actives.filter(t=>lav(t)>=45);
    const archivees=tenues.filter(t=>t.statut==="archive");
    const enSvc=actives.filter(t=>t.statut==="en_service");
    const enStk=actives.filter(t=>t.statut==="en_stock");

    const evtLine=e=>{
      let det="";
      if(e.action==="Change-Lavage") det=`<br><small style="color:#666">Rendue:${e.tenue_souilee||"—"} → Propre:${e.tenue_propre||"—"}${e.devenir==="direct"?` → ${e.beneficiaire||""}`:" → stock"}</small>`;
      if(e.action==="Affectation"||e.action==="Retour stock") det=`<br><small style="color:#666">Agent:${e.portee_par||"—"}</small>`;
      if(e.action==="Correction lavages") det=`<br><small style="color:#666">${e.ancien}→${e.nouveau} lavages</small>`;
      if(e.action==="Archivage") det=`<br><small style="color:#666">Motif:${e.motif||"—"}</small>`;
      return `<div style="padding:2px 0;border-bottom:1px solid #f0f0f0"><b>${AL[e.action]||""} ${e.action}</b><span style="color:#9ca3af;font-size:10px;margin-left:6px">${fmtD(e.date)}</span>${e.nom_op?`<span style="color:#ccc;font-size:9px"> · ${e.nom_op}</span>`:""}${det}</div>`;
    };

    const secHtml={};
    if(sel.recap) secHtml.recap=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">${[["En service",enSvc.length,"#16A34A"],["En stock",enStk.length,"#3B82F6"],["Alertes ≥45",alertes.length,"#F97316"],["Archivées",archivees.length,"#6B7280"],["Total",actives.length,"#0F1E38"]].map(([l,n,c])=>`<div style="text-align:center;padding:12px;background:#f8fafc;border-radius:10px;border:1px solid #e2e6f0"><div style="font-size:28px;font-weight:800;color:${c}">${n}</div><div style="font-size:10px;color:#9ca3af">${l}</div></div>`).join("")}</div>`;
    if(sel.actives) secHtml.actives=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse"><thead>${TH(["N° tenue","Type","Statut","Agent","Lavages","Mise en svc","Historique"])}</thead><tbody>${actives.map(t=>{const evts=[...(histo||[])].filter(h=>h.id_tenue===t.id).sort((a,b)=>b.date>a.date?1:-1);return`<tr style="border-bottom:1px solid #e5e7eb;vertical-align:top"><td style="padding:8px;font-weight:800;font-family:monospace">${t.id}</td><td style="padding:8px">${t.type==="veste"?"🥋 Veste":"👖 Pantalon"} <span style="color:#9ca3af">${t.taille}</span></td><td style="padding:8px">${badge(t.statut)}</td><td style="padding:8px;font-weight:600">${t.agent_actuel||"<span style='color:#d1d5db'>—</span>"}</td><td style="padding:8px">${bar(t)}</td><td style="padding:8px;font-size:11px;color:#6b7280">${fmtD(t.date_service)}</td><td style="padding:8px;font-size:11px;min-width:260px">${evts.length===0?"<i style='color:#d1d5db'>Aucun</i>":evts.map(evtLine).join("")}</td></tr>`;}).join("")}</tbody></table></div>`;
    if(sel.alertes&&alertes.length>0) secHtml.alertes=`<table style="width:100%;border-collapse:collapse"><thead>${TH(["N° tenue","Type","Statut","Agent","Lavages"])}</thead><tbody>${alertes.map(t=>`<tr style="background:#fff7ed;border-bottom:1px solid #fed7aa"><td style="padding:8px;font-weight:800;font-family:monospace">${t.id}</td><td style="padding:8px">${t.type==="veste"?"🥋 Veste":"👖 Pantalon"} ${t.taille}</td><td style="padding:8px">${badge(t.statut)}</td><td style="padding:8px;font-weight:600">${t.agent_actuel||"—"}</td><td style="padding:8px">${bar(t)}</td></tr>`).join("")}</tbody></table>`;
    if(sel.histo) secHtml.histo=`<table style="width:100%;border-collapse:collapse"><thead>${TH(["Date","Tenue","Action","Détail","Opérateur"])}</thead><tbody>${[...(histo||[])].sort((a,b)=>b.date>a.date?1:-1).map(e=>`<tr style="border-bottom:1px solid #e5e7eb"><td style="padding:7px 8px;color:#6b7280;font-size:11px;white-space:nowrap">${fmtD(e.date)}</td><td style="padding:7px 8px;font-weight:700;font-family:monospace">${e.id_tenue||"—"}</td><td style="padding:7px 8px;font-weight:600">${AL[e.action]||""} ${e.action}</td><td style="padding:7px 8px;font-size:11px">${e.portee_par||e.motif||""}</td><td style="padding:7px 8px;font-size:11px;color:#6b7280">${e.nom_op||""}</td></tr>`).join("")}</tbody></table>`;
    if(sel.archivees&&archivees.length>0) secHtml.archivees=`<table style="width:100%;border-collapse:collapse"><thead>${TH(["N° tenue","Type","Lavages","Motif"])}</thead><tbody>${archivees.map(t=>`<tr style="border-bottom:1px solid #e5e7eb"><td style="padding:8px;font-weight:800;font-family:monospace">${t.id}</td><td style="padding:8px">${t.type==="veste"?"🥋 Veste":"👖 Pantalon"} ${t.taille}</td><td style="padding:8px">${lav(t)} lavages</td><td style="padding:8px;color:#9ca3af;font-size:11px">${t.motif_archive||"—"}</td></tr>`).join("")}</tbody></table>`;

    const activeSecs=SECS.filter(s=>sel[s.k]&&secHtml[s.k]);
    const navHtml=activeSecs.map((s,i)=>`<button onclick="show('${s.k}')" id="btn-${s.k}" class="nav-btn${i===0?" active":""}" style="padding:7px 14px;border-radius:8px;font-weight:700;font-size:12px;border:none;cursor:pointer;font-family:inherit;background:${i===0?"#0F1E38":"transparent"};color:${i===0?"#fff":"#3D4461"}">${s.l}</button>`).join("");
    const secsHtml=activeSecs.map((s,i)=>`<div id="sec-${s.k}" class="sec" style="display:${i===0?"block":"none"}"><div style="background:#fff;border-radius:12px;padding:20px 24px;margin:16px 24px;box-shadow:0 1px 4px rgba(0,0,0,.07)"><h2 style="font-size:14px;font-weight:700;color:#0F1E38;margin-bottom:14px">${s.l}</h2>${secHtml[s.k]}</div></div>`).join("");

    const html=`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>EPI TRACK — Rapport ${date}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f8}nav{position:sticky;top:0;background:#fff;border-bottom:1px solid #e2e6f0;padding:10px 24px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;z-index:100}.nav-btn.active{background:#0F1E38!important;color:#fff!important}.nav-btn:hover{opacity:.8}tr:hover td{background:#f8f9ff}@media print{nav{display:none}.sec{display:block!important}}</style></head><body><nav><span style="font-weight:800;font-size:13px;color:#0F1E38;margin-right:8px">📋 EPI TRACK · ${date}</span>${navHtml}</nav>${secsHtml}<scr"+"ipt>function show(k){document.querySelectorAll('.sec').forEach(s=>s.style.display='none');document.getElementById('sec-'+k).style.display='block';document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn-'+k).classList.add('active')}<\/scr"+"ipt></body></html>`;

    const blob=new Blob([html],{type:"text/html;charset=utf-8"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download=`EPI_TRACK_rapport_${new Date().toISOString().split("T")[0]}.html`;
    a.click();URL.revokeObjectURL(a.href);setDone(true);
  };

  const actives=tenues.filter(t=>t.statut!=="supprime"&&t.statut!=="archive");
  const alertes=actives.filter(t=>lav(t)>=45);
  return <Sheet onClose={onClose} title="Export Rapport" sub={new Date().toLocaleDateString("fr-FR")}>
    {!done?<div>
      <div style={{fontSize:11,fontWeight:700,color:T.t3,textTransform:"uppercase",letterSpacing:".1em",marginBottom:8}}>Sections à inclure</div>
      <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:14}}>
        {SECS.map(s=><button key={s.k} onClick={()=>setSel(p=>({...p,[s.k]:!p[s.k]}))} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:sel[s.k]?T.navyLight:T.surface,border:`1.5px solid ${sel[s.k]?"rgba(15,30,56,0.20)":T.border}`,borderRadius:9,cursor:"pointer",fontFamily:"inherit",textAlign:"left",width:"100%"}}>
          <div style={{width:18,height:18,borderRadius:5,background:sel[s.k]?T.navy:T.border,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            {sel[s.k]&&<Check size={11} color="#fff"/>}
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:sel[s.k]?T.navy:T.t2}}>{s.l}</div>
            <div style={{fontSize:10,color:T.t3}}>{s.d}</div>
          </div>
        </button>)}
      </div>
      <div style={{fontSize:10.5,color:T.t3,marginBottom:12,padding:"8px 10px",background:"rgba(0,0,0,0.03)",borderRadius:8}}>📄 Un fichier .html avec onglets de navigation · imprimable via Cmd+P</div>
      <BtnNavy onClick={doExport} icon={FileSpreadsheet} disabled={!Object.values(sel).some(Boolean)} full style={{width:"100%",justifyContent:"center",padding:"9px 16px",fontSize:13}}>Générer le rapport</BtnNavy>
    </div>:<div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{width:48,height:48,borderRadius:13,background:T.svc.bg,margin:"0 auto 11px",display:"flex",alignItems:"center",justifyContent:"center"}}><CheckCircle2 size={22} color={T.svc.c}/></div>

      <BtnGhost onClick={()=>{setDone(false);onClose();}}>Fermer</BtnGhost>
    </div>}
  </Sheet>;
}

      </div>}
      <Field label="Affecter à l'agent">
        <AgentInput value={agent} onChange={setAgent} placeholder="NOM PRÉNOM de l'agent" tenues={tenues}/>
      </Field>
      <Field label="Date d'affectation">
        <TInput value={date} onChange={e=>setDate(e.target.value)} type="date" icon={Calendar}/>
      </Field>
      <OpRow grade={grade} setGrade={setGrade} nom={nom} setNom={setNom} onShowGrade={()=>setSg(true)}/>
      <BtnNavy onClick={()=>{setLastOp({grade,nom:nom.toUpperCase()});onSave({agent:agent.toUpperCase(),date,enregistre_par:{grade,nom:nom.toUpperCase()}});}} disabled={!ok} full style={{width:"100%",justifyContent:"center",padding:"9px 16px",fontSize:13}} icon={UserCheck}>Confirmer l'affectation</BtnNavy>
    </div>
    {sg&&<GradePicker value={grade} onChange={setGrade} onClose={()=>setSg(false)}/>}
  </Sheet>;
}

/* ──────────────────────────────────────────────────────
   PERSISTENT SCAN BAR — toujours actif
────────────────────────────────────────────────────── */
function ScanBar({tenues,onDetail,onCreatePrefill,blocked}){
  const [q,setQ]=useState("");
  const [results,setResults]=useState([]);
  const [active,setActive]=useState(false);
  const inputRef=useRef(null);
  const scanTimer=useRef(null);
  const scanBuf=useRef("");

  /* Focus input whenever no overlay is open */
  useEffect(()=>{
    if(!blocked){
      const t=setTimeout(()=>inputRef.current?.focus(),80);
      return()=>clearTimeout(t);
    }
  },[blocked]);

  /* Global keydown: redirect ANY printable key to the input if not already focused */
  useEffect(()=>{
    if(blocked) return;
    const onKey=e=>{
      if(e.target===inputRef.current) return;
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT") return;
      if(e.metaKey||e.ctrlKey||e.altKey) return;
      if(e.key==="Enter"){
        inputRef.current?.focus();
        return;
      }
      if(e.key.length===1){
        e.preventDefault();
        inputRef.current?.focus();
        /* Inject the character directly into state so it is not lost */
        setQ(prev=>{
          const next=(prev+e.key).toUpperCase();
          /* Trigger results update */
          const r=tenues.filter(t=>t.statut!=="supprime"&&(
            t.id.toUpperCase().startsWith(next)||
            t.id.toUpperCase().includes(next)||
            (t.agent_actuel||"").toUpperCase().includes(next)
          )).sort((a,b)=>{
            const as=a.id.toUpperCase().startsWith(next)?0:1;
            const bs=b.id.toUpperCase().startsWith(next)?0:1;
            return as-bs||a.id.localeCompare(b.id);
          }).slice(0,8);
          setResults(r);
          const exact=tenues.find(t=>t.id.toUpperCase()===next&&t.statut!=="supprime");
          if(exact&&next.length>=4){
            clearTimeout(scanTimer.current);
            scanTimer.current=setTimeout(()=>{onDetail(exact.id);setQ("");setResults([]);},280);
          }
          return next;
        });
      }
    };
    document.addEventListener("keydown",onKey,true);
    return()=>document.removeEventListener("keydown",onKey,true);
  },[blocked,tenues,onDetail,onCreatePrefill]);

  const handleChange=val=>{
    setQ(val);
    if(val.trim().length>=1){
      const r=tenues.filter(t=>t.statut!=="supprime"&&(
        t.id.toLowerCase().startsWith(val.toLowerCase())||
        t.id.toLowerCase().includes(val.toLowerCase())||
        (t.agent_actuel||"").toLowerCase().includes(val.toLowerCase())
      )).sort((a,b)=>{
        const av=a.id.toLowerCase().startsWith(val.toLowerCase())?0:1;
        const bv=b.id.toLowerCase().startsWith(val.toLowerCase())?0:1;
        return av-bv||a.id.localeCompare(b.id);
      }).slice(0,8);
      setResults(r);
      /* Auto-navigate if exact match */
      const exact=tenues.find(t=>t.id.toLowerCase()===val.trim().toLowerCase()&&t.statut!=="supprime");
      if(exact&&val.length>=4){
        clearTimeout(scanTimer.current);
        scanTimer.current=setTimeout(()=>{onDetail(exact.id);setQ("");setResults([]);},340);
      }
    } else {setResults([]);clearTimeout(scanTimer.current);}
  };

  const go=()=>{
    clearTimeout(scanTimer.current);
    const v=q.trim();
    if(!v) return;
    const exact=tenues.find(t=>t.id.toUpperCase()===v.toUpperCase()&&t.statut!=="supprime");
    if(exact){onDetail(exact.id);setQ("");setResults([]);return;}
    if(results.length===1){onDetail(results[0].id);setQ("");setResults([]);return;}
    if(results.length===0){onCreatePrefill(v);setQ("");setResults([]);}
  };

  const n=lavN;
  return <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,position:"sticky",top:50,zIndex:90,flexShrink:0}}>
    <div style={{maxWidth:1360,margin:"0 auto",padding:"8px 14px",position:"relative"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,background:active?T.surface:T.bg,borderRadius:11,padding:"0 14px",border:`1.5px solid ${active||q?T.navy+"55":T.border}`,transition:"all .15s",boxShadow:active||q?`0 0 0 3px rgba(15,30,56,0.07)`:"none"}}>
        <Search size={14} color={q?T.navy:T.t3} style={{flexShrink:0}}/>
        <input ref={inputRef} value={q}
          onChange={e=>handleChange(e.target.value.toUpperCase())}
          onFocus={()=>setActive(true)}
          onBlur={()=>setActive(false)}
          onKeyDown={e=>{
            if(e.key==="Enter"){e.preventDefault();go();}
            if(e.key==="Escape"){setQ("");setResults([]);inputRef.current?.blur();}
            if(e.key==="ArrowDown"&&results.length>0){e.preventDefault();}
          }}
          placeholder="Scanner ou saisir un N° de tenue…"
          style={{flex:1,border:"none",background:"transparent",fontSize:13.5,color:T.t1,outline:"none",padding:"11px 0",fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,letterSpacing:".03em"}}/>
        {q
          ?<button onClick={()=>{setQ("");setResults([]);clearTimeout(scanTimer.current);inputRef.current?.focus();}} style={{background:"none",border:"none",cursor:"pointer",color:T.t3,display:"flex",padding:3,borderRadius:5}}><X size={12}/></button>
          :<span style={{fontSize:9,color:T.t4,whiteSpace:"nowrap",letterSpacing:".04em"}}>SCAN · ENTRÉE</span>
        }
      </div>

      {/* Dropdown suggestions */}
      {(results.length>0||(q.length>=2&&results.length===0))&&<div style={{position:"absolute",top:"calc(100% + 1px)",left:14,right:14,background:T.surface,border:`1.5px solid ${T.navy+"33"}`,borderRadius:11,boxShadow:"0 12px 32px rgba(0,0,0,0.13)",zIndex:200,overflow:"hidden",animation:"popIn .13s ease"}}>
        {results.map((t,i)=>{
          const EI=t.type==="veste"?IMG_VESTE:IMG_PAN;
          const lv=lavN(t),col=lv>=50?"#DC2626":lv>=45?"#D97706":"#16A34A";
          return <button key={t.id} onMouseDown={e=>{e.preventDefault();onDetail(t.id);setQ("");setResults([]);clearTimeout(scanTimer.current);}}
            style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"9px 14px",background:"none",border:"none",borderBottom:i<results.length-1?`1px solid ${T.borderSub}`:"none",cursor:"pointer",fontFamily:"inherit",textAlign:"left",transition:"background .1s"}}>
            <div style={{width:26,height:26,background:T.bg,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1px solid ${T.border}`}}>
              <img src={EI} alt="" style={{width:19,height:19,objectFit:"contain"}}/>
            </div>
            <span style={{fontSize:13.5,fontWeight:800,color:T.t1,flex:1,fontFamily:"'IBM Plex Mono',monospace"}}>{t.id}</span>
            <span style={{fontSize:11,color:T.t3,maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.taille}{t.agent_actuel?` · ${t.agent_actuel}`:""}</span>
            <Badge statut={t.statut}/>
            <span style={{fontSize:10.5,fontWeight:800,color:col,minWidth:32,textAlign:"right"}}>{lv}/50</span>
          </button>;
        })}
        {results.length===0&&q.length>=2&&<div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:12,color:T.t3,flex:1}}>Aucune tenue <strong style={{fontFamily:"'IBM Plex Mono',monospace",color:T.t2}}>{q}</strong></span>
          <button onMouseDown={e=>{e.preventDefault();onCreatePrefill(q);setQ("");setResults([]);}}
            style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",background:T.navy,color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"inherit",fontWeight:700,fontSize:12}}>
            <Plus size={12}/>Créer {q}
          </button>
        </div>}
      </div>}
    </div>
  </div>;
}

/* ──────────────────────────────────────────────────────
   TOAST
────────────────────────────────────────────────────── */
function Toast({msg,type}){
  const bg=type==="error"?T.red:type==="warn"?T.warn.c:T.svc.c;
  return <div style={{position:"fixed",bottom:22,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:"8px 16px",borderRadius:10,fontSize:12,fontWeight:700,zIndex:2000,boxShadow:"0 4px 16px rgba(0,0,0,0.18)",animation:"fadeUp .2s ease",pointerEvents:"none",whiteSpace:"nowrap"}}>{msg}</div>;
}

/* ──────────────────────────────────────────────────────
   APP ROOT
────────────────────────────────────────────────────── */
function App(){
  const [view,setView]=useState("home");
  const [tenues,setTenues]=useState(DEMO?INIT_TENUES:[]);
  const [histo,setHisto]=useState(DEMO?INIT_HISTO:[]);
  const [loading,setLoading]=useState(!DEMO);
  const [selId,setSelId]=useState(null);
  const [overlay,setOverlay]=useState(null);
  const [master,setMaster]=useState(null);
  const [lastOp,setLastOp]=useState({grade:"Sergent",nom:""});
  const [toast,setToast]=useState(null);
  const [presel,setPresel]=useState(null);
  const [archPend,setArchPend]=useState(null);
  const [scanBuf,setScanBuf]=useState("");
  const [initStatut,setInitStatut]=useState("all");
  const [washEdit,setWashEdit]=useState(false);
  const [affectId,setAffectId]=useState(null);
  const sel=tenues.find(t=>t.id===selId);

  useEffect(()=>{
    if(DEMO)return;
    apiCall("all").then(d=>{
      if(!d)return;
      if(d.tenues&&d.tenues.length>0)setTenues(d.tenues.map(normTenue));
      if(d.historique&&d.historique.length>0)setHisto(d.historique.map(h=>({...h,date:toISO(h.date)||h.date})));
    }).finally(()=>setLoading(false));
  },[]);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};
  const openDetail=id=>{setSelId(id);setView("detail");};
  const openChange=id=>{setPresel(id||null);setOverlay("change");};
  const saveAffect=({agent,date,enregistre_par})=>{
    const id=affectId;
    setTenues(p=>p.map(t=>t.id===id?{...t,statut:"en_service",agent_actuel:agent,date_derniere_action:date}:t));
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date,id_tenue:id,action:"Affectation",portee_par:agent,grade_porteur:enregistre_par.grade,enregistre_par}]);
    setAffectId(null);showToast(`${id} affectée à ${agent}`);
    apiCall("affectTenue",{id,agent_actuel:agent,date,grade_op:enregistre_par.grade,nom_op:enregistre_par.nom});
  };

  const saveTenue=(t,op)=>{
    if(tenues.find(x=>x.id===t.id)){showToast("N° déjà existant","error");return;}
    setTenues(p=>[...p,t]);
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date:today(),id_tenue:t.id,action:"Création",statut_initial:t.statut,enregistre_par:{grade:op.grade,nom:op.nom}}]);
    setOverlay(null);setScanBuf("");showToast(`Tenue ${t.id} créée`);
    apiCall("createTenue",{tenue:t,grade_op:op.grade,nom_op:op.nom});
  };
  const saveChange=({id_tenue_rendue,id_tenue_donnee,agent_nom,devenir,beneficiaire_direct,date,enregistre_par})=>{
    setTenues(p=>p.map(t=>{
      if(t.id===id_tenue_rendue) return{...t,lavages_depuis_app:t.lavages_depuis_app+1,statut:devenir==="direct"?"en_service":"en_stock",agent_actuel:devenir==="direct"?(beneficiaire_direct||agent_nom):null,date_derniere_action:date};
      if(t.id===id_tenue_donnee) return{...t,statut:"en_service",agent_actuel:agent_nom,date_derniere_action:date};
      return t;
    }));
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date,id_tenue:id_tenue_rendue,action:"Change-Lavage",portee_par:agent_nom,grade_porteur:"—",tenue_souilee:id_tenue_rendue,tenue_propre:id_tenue_donnee,devenir,beneficiaire:devenir==="direct"?beneficiaire_direct||agent_nom:null,grade_ben:null,enregistre_par}]);
    setOverlay(null);showToast("Change enregistré");
    apiCall("saveChange",{id_tenue_rendue,id_tenue_donnee,agent_nom,devenir,beneficiaire_direct:beneficiaire_direct||"",date,grade_op:enregistre_par.grade,nom_op:enregistre_par.nom});
  };
  const archiveTrigger=()=>{setArchPend(sel);setMaster({action:"archiver cette tenue",cb:()=>{setMaster(null);setOverlay("archive");}});};
  const deleteTrigger=()=>{setMaster({action:"supprimer définitivement",cb:()=>{
    setTenues(p=>p.map(t=>t.id===selId?{...t,statut:"supprime",supprime_le:today()}:t));
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date:today(),id_tenue:selId,action:"Suppression",enregistre_par:{grade:"—",nom:"—"}}]);
    setMaster(null);setView("home");showToast("Tenue supprimée","error");
  }});};
  const saveArchive=({motif,grade,nom})=>{
    setTenues(p=>p.map(t=>t.id===selId?{...t,statut:"archive",motif_archive:motif,date_derniere_action:today()}:t));
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date:today(),id_tenue:selId,action:"Archivage",motif,enregistre_par:{grade,nom}}]);
    const id=selId;
    setOverlay(null);setView("home");showToast("Tenue archivée");
    apiCall("archiveTenue",{id,motif,grade_op:grade,nom_op:nom});
  };
  const editWashTrigger=()=>{setMaster({action:"corriger le compteur de lavages",cb:()=>{setMaster(null);setWashEdit(true);}});};
  const saveWash=n=>{
    const ancien=lavN(sel);
    const diff=n-ancien;
    setTenues(p=>p.map(t=>{
      if(t.id!==selId) return t;
      const newApp=Math.max(0,t.lavages_depuis_app+diff);
      return{...t,lavages_depuis_app:newApp,date_derniere_action:today()};
    }));
    setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date:today(),id_tenue:selId,action:"Correction lavages",ancien,nouveau:n,enregistre_par:{grade:"—",nom:"—"}}]);
    setWashEdit(false);showToast(`Lavages corrigés : ${n}`);
    apiCall("correctWash",{id:selId,nouveau:n});
  };

  if(loading)return(
    <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
      <div style={{width:60,height:60,borderRadius:16,background:"#0F1E38",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <img src={IMG_LOGO} alt="" style={{height:46,objectFit:"contain"}}/>
      </div>
      <div style={{fontSize:15,fontWeight:700,color:"#0D1226"}}>EPI TRACK</div>
      <div style={{fontSize:11,color:"#8891AA"}}>Chargement depuis Google Sheets…</div>
    </div>
  );
  return <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column"}}>
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@600;700&display=swap');
      *{box-sizing:border-box;margin:0;padding:0;font-family:'IBM Plex Sans',-apple-system,sans-serif;}
      @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
      @keyframes fadeUp{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
      @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
      @keyframes popIn{from{transform:scale(0.96);opacity:0}to{transform:scale(1);opacity:1}}
      input:focus{border-color:rgba(15,30,56,0.30)!important;box-shadow:0 0 0 3px rgba(15,30,56,0.07)!important;outline:none}
      input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
      button:active{opacity:.80;transform:scale(.97)}
      button:hover{opacity:.88}
      ::-webkit-scrollbar{width:3px;height:3px}
      ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.08);border-radius:99px}
      @media(min-width:900px){.desktop-cols{display:grid!important;grid-template-columns:320px 1fr;gap:0;overflow:hidden;flex:1}}
    `}</style>

    <header style={{background:T.navy,position:"sticky",top:0,zIndex:100,flexShrink:0}}>
      <div style={{maxWidth:1360,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",gap:10,height:50}}>
        <button onClick={()=>setView("home")} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:10,padding:0}}>
          <img src={IMG_LOGO} alt="SDIS 38" style={{height:36,width:"auto",objectFit:"contain",filter:"drop-shadow(0 1px 4px rgba(220,60,0,0.28))"}}/>
          <div style={{borderLeft:"1px solid rgba(255,255,255,0.10)",paddingLeft:10,textAlign:"left"}}>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",lineHeight:1,fontFamily:"'IBM Plex Mono',monospace"}}>EPI TRACK</div>
            <div style={{fontSize:7.5,color:"rgba(255,255,255,0.22)",fontWeight:500,letterSpacing:".14em",marginTop:2,textTransform:"uppercase"}}>Caserne de Vienne · SDIS 38</div>
          </div>
        </button>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5}}>
          <button onClick={()=>{setInitStatut("en_service");setView("all");}} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",background:"rgba(22,163,74,0.15)",border:"1px solid rgba(22,163,74,0.25)",borderRadius:99,cursor:"pointer",color:"#4ADE80",fontSize:11,fontFamily:"inherit",fontWeight:700}}>
            <span style={{width:5,height:5,borderRadius:99,background:"#4ADE80",flexShrink:0}}/>
            <span>{tenues.filter(t=>t.statut==="en_service").length} service</span>
          </button>
          <button onClick={()=>{setInitStatut("en_stock");setView("all");}} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.25)",borderRadius:99,cursor:"pointer",color:"#93C5FD",fontSize:11,fontFamily:"inherit",fontWeight:700}}>
            <span style={{width:5,height:5,borderRadius:99,background:"#93C5FD",flexShrink:0}}/>
            <span>{tenues.filter(t=>t.statut==="en_stock").length} stock</span>
          </button>
        </div>
      </div>
    </header>

    <ScanBar tenues={tenues} onDetail={openDetail} onCreatePrefill={pre=>{setScanBuf(pre);setOverlay("create");}} blocked={!!(overlay||master||washEdit||affectId)}/>

    {/* Desktop: left panel home, right panel detail/all */}
    <div className="desktop-cols" style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>

      {/* Left sidebar (desktop only) */}
      <div style={{borderRight:`1px solid ${T.border}`,overflowY:"auto",background:T.surface,display:"flex",flexDirection:"column"}}>
        <HomeView tenues={tenues} onDetail={openDetail} setOverlay={setOverlay} setView={setView} setPresel={setPresel} setInitStatut={setInitStatut} setAffectId={setAffectId}/>
      </div>

      {/* Main content */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {(view==="home")&&<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{textAlign:"center",padding:32}}>
            <div style={{width:56,height:56,background:T.navyLight,borderRadius:16,margin:"0 auto 12px",display:"flex",alignItems:"center",justifyContent:"center"}}><Search size={22} color={T.navy}/></div>
            <div style={{fontSize:13,fontWeight:700,color:T.t1,marginBottom:4}}>Scanner ou sélectionner une tenue</div>
            <div style={{fontSize:11,color:T.t3}}>Utilisez la barre de scan ou cliquez sur une tenue</div>
          </div>
        </div>}
        {view==="all"&&<AllView key={initStatut} tenues={tenues} onBack={()=>setView("home")} onDetail={openDetail} setOverlay={setOverlay} setPresel={setPresel} initStatut={initStatut} setAffectId={setAffectId}/>}
        {view==="detail"&&sel&&<DetailView t={sel} histo={histo} tenues={tenues} onBack={()=>setView("home")} onChange={openChange} onArchive={archiveTrigger} onDelete={deleteTrigger} onEditWash={editWashTrigger}
          onAffect={id=>setAffectId(id)}
          onStock={id=>{const idv=id;setTenues(p=>p.map(t=>t.id===idv?{...t,statut:"en_stock",agent_actuel:"",date_derniere_action:today()}:t));setHisto(p=>[...p,{id:`EVT-${Date.now()}`,date:today(),id_tenue:idv,action:"Retour stock"}]);setView("home");showToast("Tenue remise en stock");apiCall("retourStock",{id:idv});}}
        />}
      </div>
    </div>

    {overlay==="create"&&<CreateSheet onClose={()=>{setOverlay(null);setScanBuf("");}} onSave={saveTenue} tenues={tenues} lastOp={lastOp} setLastOp={setLastOp} prefill={scanBuf||null}/>}
    {overlay==="change"&&<ChangeSheet onClose={()=>setOverlay(null)} onSave={saveChange} tenues={tenues} presel={presel} lastOp={lastOp} setLastOp={setLastOp}/>}
    {overlay==="archive"&&archPend&&<ArchiveSheet tenue={archPend} onClose={()=>setOverlay(null)} onSave={saveArchive}/>}
    {overlay==="export"&&<ExportSheet tenues={tenues} histo={histo} onClose={()=>setOverlay(null)}/>}
    {affectId&&<AffectSheet tenue={tenues.find(t=>t.id===affectId)} onClose={()=>setAffectId(null)} onSave={saveAffect} tenues={tenues} lastOp={lastOp} setLastOp={setLastOp}/>}
    {master&&<MasterModal action={master.action} onSuccess={master.cb} onClose={()=>setMaster(null)}/>}
    {washEdit&&sel&&<WashEditModal tenue={sel} onSave={saveWash} onClose={()=>setWashEdit(false)}/>}
    {toast&&<Toast msg={toast.msg} type={toast.type}/>}
  </div>;
}
  
    const _root = ReactDOM.createRoot(document.getElementById('root'));
    _root.render(<App/>);
  </script>
</body>
